name: oddsfox
version: 0.1.7
config-version: 2
profile: oddsfox
# Avoid running relationship tests whose parent models are not in the selected subgraph
# (default `eager` can execute tests on e.g. stg_polymarket_wc2026_odds_daily when only upstream
# of another branch is selected, causing missing-relation errors).
flags:
  indirect_selection: buildable
model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
target-path: target
clean-targets: ["target", "dbt_packages"]
on-run-start:
  - "{{ ensure_wc2026_canonical_raw_tables() }}"
models:
  oddsfox:
    +materialized: view
    +persist_docs:
      relation: true
      columns: true
    polymarket_wc2026:
      +tags: ["wc2026", "polymarket"]
      staging:
        +schema: polymarket_wc2026_staging
        +tags: ["staging", "wc2026", "polymarket"]
      intermediate:
        +schema: polymarket_wc2026_intermediate
        +tags: ["intermediate", "wc2026", "polymarket"]
        int_polymarket_wc2026_market_tokens:
          +materialized: table
        int_polymarket_wc2026_token_hourly_odds:
          +materialized: incremental
        int_polymarket_wc2026_match_hourly_odds:
          +materialized: incremental
          +tags: ["cross_domain"]
        int_polymarket_wc2026_match_advance_tokens:
          +tags: ["cross_domain"]
        int_polymarket_wc2026_token_universe:
          +materialized: table
      marts:
        +schema: polymarket_wc2026_marts
        +materialized: table
        +tags: ["mart", "core", "wc2026", "polymarket"]
        polymarket_wc2026_knockout_market_tokens:
          +materialized: view
        polymarket_wc2026_knockout_markets:
          +materialized: view
        polymarket_wc2026_knockout_token_hourly_odds:
          +materialized: view
        polymarket_wc2026_graph_token_hourly_odds:
          +materialized: view
      observability:
        +schema: polymarket_wc2026_observability
        +materialized: table
        +tags: ["mart", "observability", "wc2026", "polymarket"]
    polymarket_us_midterms_2026:
      +tags: ["us_midterms_2026", "polymarket"]
      staging:
        +schema: polymarket_us_midterms_2026_staging
        +tags: ["staging", "us_midterms_2026", "polymarket"]
      intermediate:
        +schema: polymarket_us_midterms_2026_intermediate
        +tags: ["intermediate", "us_midterms_2026", "polymarket"]
        int_polymarket_us_midterms_2026_market_tokens:
          +materialized: table
        int_polymarket_us_midterms_2026_token_hourly_odds:
          +materialized: incremental
        int_polymarket_us_midterms_2026_token_universe:
          +materialized: table
      marts:
        +schema: polymarket_us_midterms_2026_marts
        +materialized: table
        +tags: ["mart", "core", "us_midterms_2026", "polymarket"]
        polymarket_us_midterms_2026_market_token_hourly_odds:
          +materialized: view
      observability:
        +schema: polymarket_us_midterms_2026_observability
        +materialized: table
        +tags: ["mart", "observability", "us_midterms_2026", "polymarket"]
    international_results_wc2026:
      +tags: ["wc2026", "international_results"]
      staging:
        +schema: international_results_wc2026_staging
        +tags: ["staging", "wc2026", "international_results"]
      intermediate:
        +schema: international_results_wc2026_intermediate
        +tags: ["intermediate", "wc2026", "international_results"]
      marts:
        +schema: international_results_wc2026_marts
        +materialized: table
        +tags: ["mart", "core", "wc2026", "international_results"]
      observability:
        +schema: international_results_wc2026_observability
        +materialized: table
        +tags: ["mart", "observability", "wc2026", "international_results"]
    kalshi_wc2026:
      +tags: ["wc2026", "kalshi"]
      staging:
        +schema: kalshi_wc2026_staging
        +tags: ["staging", "wc2026", "kalshi"]
      intermediate:
        +schema: kalshi_wc2026_intermediate
        +tags: ["intermediate", "wc2026", "kalshi"]
        int_kalshi_wc2026_market_hourly_odds:
          +materialized: incremental
        int_kalshi_wc2026_match_hourly_odds:
          +materialized: incremental
          +tags: ["cross_domain"]
        int_kalshi_wc2026_match_advance_markets:
          +tags: ["cross_domain"]
      marts:
        +schema: kalshi_wc2026_marts
        +materialized: table
        +tags: ["mart", "core", "wc2026", "kalshi"]
        kalshi_wc2026_stage_markets:
          +materialized: view
        kalshi_wc2026_stage_market_hourly_odds:
          +materialized: view
        kalshi_wc2026_group_winner_markets:
          +materialized: view
        kalshi_wc2026_group_winner_market_hourly_odds:
          +materialized: view
      observability:
        +schema: kalshi_wc2026_observability
        +materialized: table
        +tags: ["mart", "observability", "wc2026", "kalshi"]
    openfootball_wc2026:
      +tags: ["wc2026", "openfootball"]
      staging:
        +schema: openfootball_wc2026_staging
        +tags: ["staging", "wc2026", "openfootball"]
    wc2026:
      +tags: ["wc2026", "cross_domain"]
      intermediate:
        +schema: wc2026_intermediate
        +tags: ["intermediate", "wc2026", "cross_domain"]
      marts:
        +schema: wc2026_marts
        +materialized: table
        +tags: ["mart", "core", "wc2026", "cross_domain"]
      observability:
        +schema: wc2026_observability
        +materialized: table
        +tags: ["mart", "observability", "wc2026", "cross_domain"]
seeds:
  oddsfox:
    international_results_wc2026_team_aliases:
      +schema: international_results_wc2026_staging
      +tags: ["staging", "wc2026", "international_results"]
      +quote_columns: false
    polymarket_wc2026_contract:
      +schema: polymarket_wc2026_staging
      +tags: ["staging", "wc2026", "polymarket"]
      +quote_columns: false
    polymarket_wc2026_polygon_settlement_markets:
      +schema: polymarket_wc2026_staging
      +tags: ["staging", "wc2026", "polymarket", "polygon_settlement"]
      +quote_columns: false
      +column_types:
        proposition_id: varchar
        fifa_match_id: varchar
        stage: varchar
        group_label: varchar
        home_team: varchar
        away_team: varchar
        kickoff_at_utc: varchar
        window_start_at_utc: varchar
        window_end_at_utc: varchar
        proposition_type: varchar
        yes_represents: varchar
        no_represents: varchar
        condition_id: varchar
        yes_token_id: varchar
        no_token_id: varchar
        exchange_address: varchar
        market_structure: varchar
        openfootball_revision: varchar
        openfootball_path: varchar
        openfootball_source_lines: varchar
        openfootball_line_hash: varchar
        condition_init_tx_hash: varchar
        condition_init_log_index: varchar
        question_init_tx_hash: varchar
        question_init_log_index: varchar
        ancillary_data_sha256: varchar
        token_verification_block_number: varchar
        token_verification_block_hash: varchar
        manifest_sha256: varchar
        manifest_version: varchar
        reviewed_at_utc: varchar
    polymarket_us_midterms_2026_contract:
      +schema: polymarket_us_midterms_2026_staging
      +tags: ["staging", "us_midterms_2026", "polymarket"]
      +quote_columns: false
    kalshi_wc2026_contract:
      +schema: kalshi_wc2026_staging
      +tags: ["staging", "wc2026", "kalshi"]
      +quote_columns: false
    wc2026_schedule_matches:
      +schema: wc2026_staging
      +tags: ["staging", "wc2026", "strategy_contract"]
      +quote_columns: false
      +column_types:
        match_id: varchar
        stage: varchar
        group_label: varchar
        matchday: varchar
        match_date: varchar
        kickoff_time_et: varchar
        venue: varchar
        home_slot: varchar
        away_slot: varchar
        home_team: varchar
        away_team: varchar
        status: varchar
        source: varchar
    wc2026_third_place_options:
      +schema: wc2026_staging
      +tags: ["staging", "wc2026", "strategy_contract"]
      +quote_columns: false
      +column_types:
        option_id: varchar
        slot_1a_group: varchar
        slot_1b_group: varchar
        slot_1d_group: varchar
        slot_1e_group: varchar
        slot_1g_group: varchar
        slot_1i_group: varchar
        slot_1k_group: varchar
        slot_1l_group: varchar
    wc2026_base_camps_teams:
      +schema: wc2026_staging
      +tags: ["staging", "wc2026", "strategy_contract"]
      +quote_columns: false
      +column_types:
        team_name_fifa: varchar
        team_name_model: varchar
        base_camp_market: varchar
        base_camp_country: varchar
        training_site_name: varchar
        training_site_lat: varchar
        training_site_lon: varchar
        training_site_timezone: varchar
        training_site_altitude_m: varchar
        geocode_quality: varchar
        geocode_source: varchar
        manual_review_status: varchar
        source_url: varchar
        source_updated_at: varchar
        notes: varchar
    wc2026_venues:
      +schema: wc2026_staging
      +tags: ["staging", "wc2026", "strategy_contract"]
      +quote_columns: false
      +column_types:
        venue: varchar
        host_city: varchar
        host_country: varchar
        venue_lat: varchar
        venue_lon: varchar
        venue_timezone: varchar
        venue_altitude_m: varchar
    wc2026_team_canonical_aliases:
      +schema: wc2026_staging
      +tags: ["staging", "wc2026", "strategy_contract"]
      +quote_columns: false
    wc2026_tournament_classification:
      +schema: wc2026_staging
      +tags: ["staging", "wc2026", "strategy_contract"]
      +quote_columns: false
      +column_types:
        tournament: varchar
        is_friendly: boolean
        is_competitive: boolean
        competition_family: varchar
        confederation_scope: varchar
        notes: varchar
