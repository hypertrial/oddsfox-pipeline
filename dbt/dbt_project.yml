name: oddsfox
version: 0.1.4
config-version: 2
profile: oddsfox
# Avoid running relationship tests whose parent models are not in the selected subgraph
# (default `eager` can execute tests on e.g. stg_wc2026_polymarket_odds_daily when only upstream
# of another branch is selected, causing missing-relation errors).
flags:
  indirect_selection: buildable
vars:
  wc2026_polymarket_whale_min_volume_usd: 100000
model-paths: ["models"]
test-paths: ["tests"]
target-path: target
clean-targets: ["target", "dbt_packages"]
models:
  oddsfox:
    +materialized: view
    +persist_docs:
      relation: true
      columns: true
    wc2026_polymarket:
      +tags: ["wc2026", "polymarket"]
      staging:
        +schema: wc2026_polymarket_staging
        +tags: ["staging", "wc2026", "polymarket"]
      intermediate:
        +schema: wc2026_polymarket_intermediate
        +tags: ["intermediate", "wc2026", "polymarket"]
        int_wc2026_polymarket_market_tokens:
          +materialized: table
        int_wc2026_polymarket_token_universe:
          +materialized: table
        int_wc2026_polymarket_token_daily_timeseries:
          +materialized: table
      marts:
        +schema: wc2026_polymarket_marts
        +materialized: table
        +tags: ["mart", "core", "wc2026", "polymarket"]
        wc2026_token_minutely_odds:
          +materialized: view
        wc2026_token_hourly_odds:
          +materialized: view
        wc2026_token_daily_odds:
          +materialized: view
        wc2026_whale_minutely_odds:
          +materialized: view
        wc2026_markets:
          +materialized: view
        wc2026_market_tokens:
          +materialized: view
        wc2026_knockout_market_tokens:
          +materialized: view
        wc2026_knockout_token_hourly_odds:
          +materialized: view
      observability:
        +schema: wc2026_polymarket_observability
        +materialized: table
        +tags: ["mart", "observability", "wc2026", "polymarket"]
