# Packaged default for Dagster and local `dbt` CLI. Override with ~/.dbt or DBT_PROFILES_DIR.
# `schema` is the dbt fallback target schema (only untagged resources); modeled relations use
# full custom schema names via generate_schema_name (e.g. polymarket_wc2026_staging).
# Set DUCKDB_PATH for an absolute warehouse path; from the repo root you can also
# run dbt without it by relying on the default filename below.
oddsfox:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: "{{ env_var('DUCKDB_PATH', 'oddsfox.duckdb') }}"
      schema: dbt
      threads: 4
      settings:
        extension_directory: "{{ env_var('DUCKDB_EXTENSION_DIRECTORY', '.cache/duckdb/extensions') }}"
