        - {
            market_ticker: "LIVE-NO-PRICE",
            current_price_status: "missing_live",
            is_current_price_fresh: false,
            is_actionable_live_market: false
          }
        - {
            market_ticker: "RESOLVED-WITH-PRICE",
            current_price_status: "historical_resolved",
            is_current_price_fresh: false,
            is_actionable_live_market: false
          }
