version: 2

models:
  - name: int_kalshi_wc2026_market_hourly_odds
    description: >
      Incremental hourly OHLC fact for Kalshi WC2026 markets in the trailing
      contract window.
    tests:
      - no_duplicate_grain:
          arguments:
            grain_columns: [market_ticker, odds_hour_epoch]
      - price_columns_in_unit_interval:
          arguments:
            identifier_columns: [market_ticker, odds_hour_epoch]
            price_columns:
              - open_price
              - high_price
              - low_price
              - close_price
              - avg_price
    columns:
      - name: market_ticker
        description: Kalshi market ticker.
        tests: [not_null]
      - name: odds_hour_epoch
        description: Unix epoch seconds for the UTC hour bucket.
        tests: [not_null]
      - name: odds_hour_utc
        description: UTC hourly odds bucket.
        tests: [not_null]

  - name: int_kalshi_wc2026_stage_classification
    description: >
      One row per Kalshi WC2026 stage market joined to FIFA team status.
    tests:
      - no_duplicate_grain:
          arguments:
            grain_columns: [market_ticker]
    columns:
      - name: market_ticker
        description: Kalshi market ticker.
        tests: [not_null, unique]
      - name: stage_key
        description: Normalized WC2026 stage key.
        tests: [not_null]
      - name: market_direction
        description: Source market wording direction.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['winner', 'elimination']
      - name: progression_outcome_label
        description: Normalized team progression outcome represented by the market.
        tests: [not_null]
      - name: canonical_team_name
        description: Canonical WC2026 team name from the fixture/results mart.
        tests:
          - not_null
          - relationships:
              config:
                tags: [cross_domain]
              arguments:
                to: ref('international_results_wc2026_team_status')
                field: team_name

  - name: int_kalshi_wc2026_group_winner_classification
    description: >
      One row per Kalshi WC2026 group-winner market joined to FIFA team status.
    tests:
      - no_duplicate_grain:
          arguments:
            grain_columns: [market_ticker]
    columns:
      - name: market_ticker
        description: Kalshi market ticker.
        tests: [not_null, unique]
      - name: group_letter
        description: FIFA World Cup group letter inferred from the Kalshi event.
        tests: [not_null]
      - name: price_represents
        description: Semantic meaning of public price fields.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['group_winner_probability']
      - name: canonical_team_name
        description: Canonical WC2026 team name from the fixture/results mart.
        tests:
          - not_null
          - relationships:
              config:
                tags: [cross_domain]
              arguments:
                to: ref('international_results_wc2026_team_status')
                field: team_name

unit_tests:
  - name: test_kalshi_wc2026_stage_classifier_series_suffixes
    model: int_kalshi_wc2026_stage_classification
    given:
      - input: ref('int_kalshi_wc2026_markets')
        rows:
          - {
              market_ticker: "KXWCSTAGEOFELIM-26ARG-R16",
              event_ticker: "KXWCSTAGEOFELIM-26ARG",
              series_ticker: "KXWCSTAGEOFELIM",
              event_suffix: "26ARG",
              market_suffix: "R16",
              title: "Argentina",
              subtitle: "",
              yes_sub_title: "Argentina",
              no_sub_title: "",
              status: "active",
              market_type: "binary",
              open_time: "2026-01-01 00:00:00",
              close_time: "2026-07-19 00:00:00",
              expiration_time: "2026-07-19 00:00:00",
              volume: 100,
              open_interest: 10,
              last_price: 0.45,
              scraped_at: "2026-01-01 00:00:00",
              scope_name: "wc2026"
            }
      - input: ref('international_results_wc2026_team_aliases')
        rows: []
      - input: ref('international_results_wc2026_team_status')
        rows:
          - {
              team_name: "Argentina",
              tournament_status: "active",
              is_still_alive: true,
              eliminated_stage_key: null,
              eliminated_match_date: null,
              next_match_date: null,
              next_stage_key: null,
              matches_played: 0,
              wins: 0,
              draws: 0,
              losses: 0,
              goals_for: 0,
              goals_against: 0,
              latest_completed_match_date: null,
              latest_completed_stage_key: null
            }
    expect:
      rows:
        - {
            market_ticker: "KXWCSTAGEOFELIM-26ARG-R16",
            stage_key: "round_of_16",
            stage_rank: 2,
            market_direction: "elimination",
            progression_outcome_label: "not_eliminated_in_round_of_16",
            price_represents: "progression",
            canonical_team_name: "Argentina",
            market_status: "live",
            is_live_market: true
          }

  - name: test_kalshi_wc2026_group_winner_classifier_group_suffix
    model: int_kalshi_wc2026_group_winner_classification
    given:
      - input: ref('int_kalshi_wc2026_markets')
        rows:
          - {
              market_ticker: "KXWCGROUPWIN-26A-MEX",
              event_ticker: "KXWCGROUPWIN-26A",
              series_ticker: "KXWCGROUPWIN",
              event_suffix: "26A",
              market_suffix: "MEX",
              title: "Mexico",
              subtitle: "",
              yes_sub_title: "Mexico",
              no_sub_title: "",
              status: "finalized",
              market_type: "binary",
              open_time: "2026-01-01 00:00:00",
              close_time: "2026-07-19 00:00:00",
              expiration_time: "2026-07-19 00:00:00",
              volume: 100,
              open_interest: 10,
              last_price: 0.25,
              scraped_at: "2026-01-01 00:00:00",
              scope_name: "wc2026"
            }
      - input: ref('international_results_wc2026_team_aliases')
        rows: []
      - input: ref('international_results_wc2026_team_status')
        rows:
          - {
              team_name: "Mexico",
              tournament_status: "active",
              is_still_alive: true,
              eliminated_stage_key: null,
              eliminated_match_date: null,
              next_match_date: null,
              next_stage_key: null,
              matches_played: 0,
              wins: 0,
              draws: 0,
              losses: 0,
              goals_for: 0,
              goals_against: 0,
              latest_completed_match_date: null,
              latest_completed_stage_key: null
            }
    expect:
      rows:
        - {
            market_ticker: "KXWCGROUPWIN-26A-MEX",
            group_letter: "A",
            price_represents: "group_winner_probability",
            canonical_team_name: "Mexico",
            market_status: "resolved",
            is_live_market: false
          }
