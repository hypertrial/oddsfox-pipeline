version: 2

models:
  - name: polymarket_wc2026_match_minute_odds
    description: >
      Dense in-game WC2026 minute odds for 216 group moneyline and 32 knockout
      advance/win markets. Missing source minutes remain null; prices are raw
      Polymarket probabilities and are never normalized or forward-filled.
    tests:
      - no_duplicate_grain:
          arguments:
            grain_columns: [odds_minute_epoch, market_id]
      - price_columns_in_unit_interval:
          arguments:
            identifier_columns: [odds_minute_epoch, market_id]
            price_columns:
              - yes_open_price
              - yes_high_price
              - yes_low_price
              - yes_close_price
              - yes_average_price
              - no_open_price
              - no_high_price
              - no_low_price
              - no_close_price
              - no_average_price
    columns:
      - name: odds_minute_utc
        description: Inclusive UTC minute bucket within Gamma's actual game window.
        tests: [not_null]
      - name: odds_minute_epoch
        description: Epoch second of odds_minute_utc.
        tests: [not_null]
      - name: fifa_match_id
        description: Official FIFA match number from 1 through 104.
        tests: [not_null]
      - name: market_id
        description: Polymarket market identifier; one proposition per row series.
        tests: [not_null]
      - name: proposition_type
        description: Stable home_win, draw, away_win, home_advances, third-place, or final meaning.
        tests: [not_null]
      - name: yes_clob_token_id
        description: Literal Yes token for group markets or official-home outcome token for knockout markets.
        tests: [not_null]
      - name: no_clob_token_id
        description: Literal No token for group markets or official-away outcome token for knockout markets.
        tests: [not_null]
      - name: minute_complete
        description: True only when both selected tokens have at least one source point in the minute.
        tests: [not_null]

  - name: polymarket_wc2026_knockout_market_tokens
    description: >
      WC2026 knockout progression-side token universe (scope=wc2026, at or
      above the WC2026 contract volume floor, currently $5,000 USD).
      Winner/reach markets use the Yes token; elimination-framed markets use
      the No token.
    tests:
      - no_duplicate_grain:
          arguments:
            grain_columns: [clob_token_id]
    columns:
      - name: clob_token_id
        description: Source CLOB outcome token selected for progression-side odds.
        tests: [not_null, unique]
      - name: market_id
        description: Polymarket market identifier.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_polymarket_wc2026_markets')
                field: market_id
      - name: source_outcome_label
        description: Source outcome label for the selected CLOB token.
        tests: [not_null]
      - name: market_direction
        description: Source market wording direction.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['winner', 'advance', 'elimination']
      - name: price_represents
        description: Semantic meaning of public price fields; fixed to progression-side probability.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['progression']
      - name: progression_outcome_label
        description: Stable normalized progression outcome represented by the selected token price.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - win_world_cup
                  - reach_final
                  - reach_semifinal
                  - reach_quarterfinal
                  - reach_round_of_16
                  - reach_round_of_32
                  - not_eliminated_in_round_of_16
                  - not_eliminated_in_round_of_32
      - name: market_status
        description: Derived market state; resolved and closed markets are historical, not live odds.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['resolved', 'closed', 'live', 'inactive']
      - name: is_live_market
        description: True only for active, not closed, not resolved source markets.
        tests: [not_null]
      - name: is_active_team_live_market
        description: True when the source market is live and the WC2026 results mart says the team is still alive.
        tests: [not_null]
      - name: source_state_anomaly
        description: True when Gamma reports both active and closed for the same market.
        tests: [not_null]
      - name: stage_key
        description: Normalized WC2026 knockout stage key.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - winner
                  - final
                  - semifinal
                  - quarterfinal
                  - round_of_16
                  - round_of_32
      - name: team_name
        description: Team extracted from the source question.
        tests: [not_null]
      - name: canonical_team_name
        description: Canonical WC2026 team name from the FIFA World Cup fixture/results mart.
        tests:
          - not_null
          - relationships:
              config:
                tags: [cross_domain]
              arguments:
                to: ref('international_results_wc2026_team_status')
                field: team_name
      - name: tournament_status
        description: Current tournament status from the fixture/results mart.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['active', 'eliminated', 'champion']
      - name: is_still_alive
        description: True when the canonical team is currently active, not eliminated or crowned champion.
        tests: [not_null]

  - name: polymarket_wc2026_knockout_markets
    description: >
      Latest WC2026 knockout progression-side market snapshot, including the
      latest hourly close price when available.
    tests:
      - no_duplicate_grain:
          arguments:
            grain_columns: [clob_token_id]
    columns:
      - name: clob_token_id
        description: Source CLOB outcome token selected for progression-side odds.
        tests: [not_null, unique]
      - name: market_id
        description: Polymarket market identifier.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_polymarket_wc2026_markets')
                field: market_id
      - name: stage_key
        description: Normalized WC2026 knockout stage key.
        tests: [not_null]
      - name: market_direction
        description: Source market wording direction.
        tests: [not_null]
      - name: price_represents
        description: Semantic meaning of public price fields; fixed to progression-side probability.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['progression']
      - name: progression_outcome_label
        description: Stable normalized progression outcome represented by the selected token price.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - win_world_cup
                  - reach_final
                  - reach_semifinal
                  - reach_quarterfinal
                  - reach_round_of_16
                  - reach_round_of_32
                  - not_eliminated_in_round_of_16
                  - not_eliminated_in_round_of_32
      - name: market_status
        description: Derived market state; closed/resolved rows remain in this snapshot as historical rows.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['resolved', 'closed', 'live', 'inactive']
      - name: is_active_team_live_market
        description: True when the source market is live and the WC2026 results mart says the team is still alive.
        tests: [not_null]
      - name: current_price_status
        description: Derived freshness/status bucket for the latest progression-side price.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - fresh_live
                  - stale_live
                  - missing_live
                  - historical_closed
                  - historical_resolved
                  - inactive
      - name: current_price_age_hours
        description: Age of the latest hourly close in hours at dbt build time.
      - name: is_current_price_fresh
        description: True for live rows whose latest hourly close is within the WC2026 contract freshness window.
        tests: [not_null]
      - name: is_actionable_live_market
        description: True for still-alive live teams whose latest hourly close is fresh enough for current consumption.
        tests: [not_null]
      - name: canonical_team_name
        description: Canonical WC2026 team name from the FIFA World Cup fixture/results mart.
        tests: [not_null]
      - name: tournament_status
        description: Current tournament status from the fixture/results mart.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['active', 'eliminated', 'champion']

  - name: polymarket_wc2026_knockout_token_hourly_odds
    description: >
      View over incremental trailing 30-day WC2026 knockout progression-side
      hourly OHLC odds with current stage/team classification and source-market
      metadata.
    tests:
      - no_duplicate_grain:
          arguments:
            grain_columns: [clob_token_id, odds_hour_epoch]
      - price_columns_in_unit_interval:
          arguments:
            identifier_columns: [clob_token_id, odds_hour_epoch]
            price_columns:
              - open_price
              - high_price
              - low_price
              - close_price
              - avg_price
    columns:
      - name: clob_token_id
        description: Source CLOB outcome token selected for progression-side odds.
        tests: [not_null]
      - name: market_id
        description: Polymarket market identifier.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_polymarket_wc2026_markets')
                field: market_id
      - name: source_outcome_label
        description: Source outcome label for the selected CLOB token.
        tests: [not_null]
      - name: odds_hour_epoch
        description: Unix epoch seconds for the UTC hour bucket.
        tests: [not_null]
      - name: market_direction
        description: Source market wording direction.
        tests: [not_null]
      - name: price_represents
        description: Semantic meaning of public OHLC price fields; fixed to progression-side probability.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['progression']
      - name: progression_outcome_label
        description: Stable normalized progression outcome represented by the selected token price.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - win_world_cup
                  - reach_final
                  - reach_semifinal
                  - reach_quarterfinal
                  - reach_round_of_16
                  - reach_round_of_32
                  - not_eliminated_in_round_of_16
                  - not_eliminated_in_round_of_32
      - name: market_status
        description: Derived market state propagated from the knockout token universe.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['resolved', 'closed', 'live', 'inactive']
      - name: is_live_market
        description: True only for live source markets at dbt build time.
        tests: [not_null]
      - name: is_active_team_live_market
        description: True when the source market is live and the WC2026 results mart says the team is still alive.
        tests: [not_null]
      - name: canonical_team_name
        description: Canonical WC2026 team name from the FIFA World Cup fixture/results mart.
        tests: [not_null]
      - name: tournament_status
        description: Current tournament status from the fixture/results mart.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['active', 'eliminated', 'champion']

  - name: polymarket_wc2026_graph_token_hourly_odds
    description: >
      Graph-build export surface for WC2026 knockout markets. Unlike the public
      progression-side mart, this keeps both Yes and No tokens per market and
      carries dbt-clean stage/team/progression semantics for oddsfox-graph.
    tests:
      - no_duplicate_grain:
          arguments:
            grain_columns: [clob_token_id, odds_hour_epoch]
      - price_columns_in_unit_interval:
          arguments:
            identifier_columns: [clob_token_id, odds_hour_epoch]
            price_columns:
              - open_price
              - high_price
              - low_price
              - close_price
              - avg_price
    columns:
      - name: market_id
        description: Polymarket market identifier.
        tests: [not_null]
      - name: outcome_index
        description: Zero-based outcome index within the source market.
        tests: [not_null]
      - name: clob_token_id
        description: Polymarket CLOB outcome token identifier.
        tests: [not_null]
      - name: question
        description: Source market question.
        tests: [not_null]
      - name: outcome_label
        description: Source token label, usually Yes or No.
        tests: [not_null]
      - name: event_slug
        description: Polymarket event slug.
        tests: [not_null]
      - name: market_volume_usd
        description: Source market volume in USD.
        tests: [not_null]
      - name: stage_key
        description: dbt-clean WC2026 knockout stage key.
        tests: [not_null]
      - name: stage_rank
        description: Numeric ordering for knockout progression stages.
        tests: [not_null]
      - name: canonical_team_name
        description: Canonical WC2026 team name from the fixture/results mart.
        tests: [not_null]
      - name: market_direction
        description: Classified question direction, such as winner, reach, or eliminated.
        tests: [not_null]
      - name: progression_outcome_label
        description: Normalized semantic outcome that represents team progression for this market.
        tests: [not_null]
      - name: is_progression_token
        description: True when this token price represents progressing to or past the stage.
        tests: [not_null]
      - name: opposite_clob_token_id
        description: Other token in the same binary market.
        tests: [not_null]
      - name: market_status
        description: Derived source market state.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['resolved', 'closed', 'live', 'inactive']
      - name: is_still_alive
        description: True when the canonical team is still alive in the WC2026 results mart.
        tests: [not_null]
      - name: odds_hour_epoch
        description: Unix epoch seconds for the UTC hour bucket.
        tests: [not_null]
