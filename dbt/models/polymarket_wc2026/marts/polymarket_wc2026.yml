version: 2

models:
  - name: polymarket_wc2026_knockout_market_tokens
    description: >
      WC2026 knockout progression-side token universe (scope=wc2026, volume >=
      $5,000 USD). Winner/reach markets use the Yes token; elimination-framed
      markets use the No token.
    tests:
      - no_duplicate_grain:
          arguments:
            grain_columns: [clob_token_id]
    columns:
      - name: clob_token_id
        description: Source CLOB outcome token selected for progression-side odds.
        tests: [not_null, unique]
      - name: market_id
        description: Polymarket market identifier.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_polymarket_wc2026_markets')
                field: market_id
      - name: source_outcome_label
        description: Source outcome label for the selected CLOB token.
        tests: [not_null]
      - name: market_direction
        description: Source market wording direction.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['winner', 'advance', 'elimination']
      - name: stage_key
        description: Normalized WC2026 knockout stage key.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - winner
                  - final
                  - semifinal
                  - quarterfinal
                  - round_of_16
                  - round_of_32
      - name: team_name
        description: Team extracted from the source question.
        tests: [not_null]

  - name: polymarket_wc2026_knockout_markets
    description: >
      Latest WC2026 knockout progression-side market snapshot, including the
      latest hourly close price when available.
    tests:
      - no_duplicate_grain:
          arguments:
            grain_columns: [clob_token_id]
    columns:
      - name: clob_token_id
        description: Source CLOB outcome token selected for progression-side odds.
        tests: [not_null, unique]
      - name: market_id
        description: Polymarket market identifier.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_polymarket_wc2026_markets')
                field: market_id
      - name: stage_key
        description: Normalized WC2026 knockout stage key.
        tests: [not_null]
      - name: market_direction
        description: Source market wording direction.
        tests: [not_null]

  - name: polymarket_wc2026_knockout_token_hourly_odds
    description: >
      Trailing 30-day WC2026 knockout progression-side hourly OHLC odds with
      stage/team classification and source-market metadata.
    tests:
      - no_duplicate_grain:
          arguments:
            grain_columns: [clob_token_id, odds_hour_epoch]
      - price_columns_in_unit_interval:
          arguments:
            identifier_columns: [clob_token_id, odds_hour_epoch]
            price_columns:
              - open_price
              - high_price
              - low_price
              - close_price
              - avg_price
    columns:
      - name: clob_token_id
        description: Source CLOB outcome token selected for progression-side odds.
        tests: [not_null]
      - name: market_id
        description: Polymarket market identifier.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_polymarket_wc2026_markets')
                field: market_id
      - name: source_outcome_label
        description: Source outcome label for the selected CLOB token.
        tests: [not_null]
      - name: odds_hour_epoch
        description: Unix epoch seconds for the UTC hour bucket.
        tests: [not_null]
      - name: market_direction
        description: Source market wording direction.
        tests: [not_null]
