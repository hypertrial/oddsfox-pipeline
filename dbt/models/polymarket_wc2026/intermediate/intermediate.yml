version: 2

models:
  - name: int_polymarket_wc2026_markets
    description: >
      WC2026 Polymarket markets admitted by polymarket_wc2026_ops.market_scope_registry.
    tests:
      - no_duplicate_grain:
          arguments:
            grain_columns: [scope_name, market_id]
    columns:
      - name: market_id
        description: Polymarket market identifier.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_polymarket_wc2026_markets')
                field: market_id
      - name: scope_name
        description: Scope name, fixed to wc2026.
        tests: [not_null]
      - name: event_slug
        description: Event slug when present in source metadata.

  - name: int_polymarket_wc2026_token_universe
    description: >
      Canonical token universe: one row per CLOB outcome token joined to market
      labels, state, and volume.
    columns:
      - name: clob_token_id
        description: CLOB outcome token identifier.
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('stg_polymarket_wc2026_market_tokens')
                field: clob_token_id
      - name: market_id
        description: Polymarket market identifier for this token.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_polymarket_wc2026_markets')
                field: market_id
      - name: outcome_index
        description: Zero-based outcome index from the market token mapping.
        tests: [not_null]
      - name: token_updated_at
        description: UTC timestamp when the raw market_tokens row was last written.
      - name: question
        description: Market prompt text from staging markets.
      - name: outcome_label
        description: Resolved outcome label from the market outcomes array.
      - name: event_slug
        description: Event slug for grouping related markets.
      - name: is_active
        description: Whether the market is currently active in staging metadata.
      - name: is_closed
        description: Whether the market is closed in staging metadata.
      - name: market_volume_usd
        description: Reported market volume from staging metadata.

  - name: int_polymarket_wc2026_market_tokens
    description: >
      WC2026 token universe: one row per CLOB outcome token whose market
      belongs to int_polymarket_wc2026_markets.
    columns:
      - name: clob_token_id
        description: CLOB outcome token identifier.
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('int_polymarket_wc2026_token_universe')
                field: clob_token_id
      - name: market_id
        description: WC2026 Polymarket market identifier for this token.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_polymarket_wc2026_markets')
                field: market_id
      - name: outcome_index
        description: Zero-based outcome index from the market token mapping.
        tests: [not_null]
      - name: token_updated_at
        description: UTC timestamp when the raw market_tokens row was last written.
      - name: question
        description: Market prompt text from staging markets.
      - name: outcome_label
        description: Resolved outcome label from the market outcomes array.
      - name: event_slug
        description: Event slug for grouping related markets.
      - name: is_active
        description: Whether the market is currently active in staging metadata.
      - name: is_closed
        description: Whether the market is closed in staging metadata.
      - name: market_volume_usd
        description: Reported market volume from staging metadata.

  - name: int_polymarket_wc2026_token_daily_timeseries
    description: >
      Token-level daily odds joined to int_polymarket_wc2026_market_tokens; grain is one
      row per (clob_token_id, odds_date_utc) when daily odds exist.
    tests:
      - no_duplicate_grain:
          arguments:
            grain_columns: [clob_token_id, odds_date_utc]
    columns:
      - name: market_id
        description: Polymarket market identifier.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_polymarket_wc2026_markets')
                field: market_id
      - name: outcome_index
        description: Zero-based outcome index from the market token mapping.
      - name: clob_token_id
        description: CLOB outcome token identifier.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_polymarket_wc2026_market_tokens')
                field: clob_token_id
      - name: question
        description: Market prompt text from staging markets.
      - name: event_slug
        description: Event slug for grouping related markets.
      - name: is_active
        description: Whether the market is currently active in staging metadata.
      - name: is_closed
        description: Whether the market is closed in staging metadata.
      - name: odds_date_utc
        description: UTC calendar date for the aggregated token odds row.
      - name: open_price
        description: Opening price for the token on this UTC day.
      - name: high_price
        description: High price across the day.
      - name: low_price
        description: Low price across the day.
      - name: close_price
        description: Closing price for the token on this UTC day.
      - name: avg_price
        description: Average price for the UTC day when present.
      - name: observed_points
        description: Number of canonical odds points collapsed into this daily row.
      - name: first_timestamp
        description: Raw epoch seconds of the first contributing observation.
      - name: first_observed_at
        description: Timestamp of the first contributing observation.
      - name: last_timestamp
        description: Raw epoch seconds of the last contributing observation.
      - name: last_observed_at
        description: Timestamp of the last contributing observation.
