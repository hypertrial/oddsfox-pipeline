version: 2

models:
  - name: int_polymarket_wc2026_markets
    description: >
      WC2026 Polymarket markets admitted by polymarket_wc2026_ops.market_scope_registry
      at or above the WC2026 contract volume floor (currently $5,000 USD;
      re-evaluated each dbt build).
    tests:
      - no_duplicate_grain:
          arguments:
            grain_columns: [scope_name, market_id]
    columns:
      - name: market_id
        description: Polymarket market identifier.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_polymarket_wc2026_markets')
                field: market_id
      - name: scope_name
        description: Scope name, fixed to wc2026.
        tests: [not_null]
      - name: event_slug
        description: Event slug when present in source metadata.

  - name: int_polymarket_wc2026_token_universe
    description: >
      Canonical token universe: one row per CLOB outcome token joined to market
      labels, state, and volume.
    columns:
      - name: clob_token_id
        description: CLOB outcome token identifier.
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('stg_polymarket_wc2026_market_tokens')
                field: clob_token_id
      - name: market_id
        description: Polymarket market identifier for this token.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_polymarket_wc2026_markets')
                field: market_id
      - name: outcome_index
        description: Zero-based outcome index from the market token mapping.
        tests: [not_null]
      - name: token_updated_at
        description: UTC timestamp when the raw market_tokens row was last written.
      - name: question
        description: Market prompt text from staging markets.
      - name: outcome_label
        description: Resolved outcome label from the market outcomes array.
      - name: event_slug
        description: Event slug for grouping related markets.
      - name: is_active
        description: Whether the market is currently active in staging metadata.
      - name: is_closed
        description: Whether the market is closed in staging metadata.
      - name: market_volume_usd
        description: Reported market volume from staging metadata.

  - name: int_polymarket_wc2026_market_tokens
    description: >
      WC2026 token universe: one row per CLOB outcome token whose market
      belongs to int_polymarket_wc2026_markets.
    columns:
      - name: clob_token_id
        description: CLOB outcome token identifier.
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('int_polymarket_wc2026_token_universe')
                field: clob_token_id
      - name: market_id
        description: WC2026 Polymarket market identifier for this token.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_polymarket_wc2026_markets')
                field: market_id
      - name: outcome_index
        description: Zero-based outcome index from the market token mapping.
        tests: [not_null]
      - name: token_updated_at
        description: UTC timestamp when the raw market_tokens row was last written.
      - name: question
        description: Market prompt text from staging markets.
      - name: outcome_label
        description: Resolved outcome label from the market outcomes array.
      - name: event_slug
        description: Event slug for grouping related markets.
      - name: is_active
        description: Whether the market is currently active in staging metadata.
      - name: is_closed
        description: Whether the market is closed in staging metadata.
      - name: market_volume_usd
        description: Reported market volume from staging metadata.

  - name: int_polymarket_wc2026_token_hourly_odds
    description: >
      Incremental hourly OHLC price fact for Polymarket CLOB tokens in the
      WC2026 trailing contract window. Public knockout marts join this fact to
      current market/team metadata at query time.
    tests:
      - no_duplicate_grain:
          arguments:
            grain_columns: [clob_token_id, odds_hour_epoch]
      - price_columns_in_unit_interval:
          arguments:
            identifier_columns: [clob_token_id, odds_hour_epoch]
            price_columns:
              - open_price
              - high_price
              - low_price
              - close_price
              - avg_price
    columns:
      - name: clob_token_id
        description: Source CLOB outcome token identifier.
        tests: [not_null]
      - name: odds_hour_utc
        description: UTC hourly odds bucket.
        tests: [not_null]
      - name: odds_hour_epoch
        description: Unix epoch seconds for the UTC hour bucket.
        tests: [not_null]
      - name: open_price
        description: First observed price in the hour.
      - name: high_price
        description: Highest observed price in the hour.
      - name: low_price
        description: Lowest observed price in the hour.
      - name: close_price
        description: Last observed price in the hour.
      - name: avg_price
        description: Average observed price in the hour.
      - name: observed_points
        description: Number of raw odds points observed in the hour.
        tests: [not_null]
      - name: latest_ingested_at
        description: Latest raw ingestion timestamp represented in this hourly bucket.

  - name: int_polymarket_wc2026_knockout_market_classification
    description: >
      Shared WC2026 knockout market classifier used by public knockout marts and
      observability. One row per real-team knockout market question.
    tests:
      - no_duplicate_grain:
          arguments:
            grain_columns: [market_id]
    columns:
      - name: market_id
        description: Polymarket market identifier.
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('stg_polymarket_wc2026_markets')
                field: market_id
      - name: stage_key
        description: Normalized WC2026 knockout stage key.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - winner
                  - final
                  - semifinal
                  - quarterfinal
                  - round_of_16
                  - round_of_32
      - name: market_direction
        description: Source market wording direction.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['winner', 'advance', 'elimination']
      - name: progression_outcome_label
        description: Stable normalized progression outcome represented by progression-side odds.
        tests: [not_null]
      - name: team_name
        description: Team extracted from the source question.
        tests: [not_null]
      - name: canonical_team_name
        description: Canonical WC2026 team name from the FIFA World Cup fixture/results mart.
        tests:
          - not_null
          - relationships:
              config:
                tags: [cross_domain]
              arguments:
                to: ref('international_results_wc2026_team_status')
                field: team_name
      - name: market_status
        description: Derived market state; closed wins over active when both source flags are true.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['resolved', 'closed', 'live', 'inactive']
