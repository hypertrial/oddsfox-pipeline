          - {clob_token_id: no-1, odds_minute_utc: '2026-07-01 12:00:00', odds_minute_epoch: 1782907200, open_price: 0.6425, high_price: 0.6425, low_price: 0.6425, close_price: 0.6425, average_price: 0.6425, observed_points: 1, first_observed_at: '2026-07-01 12:00:05', last_observed_at: '2026-07-01 12:00:05'}
