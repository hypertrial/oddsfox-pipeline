version: 2

models:
  - name: int_polymarket_wc2026_match_market_universe
    description: Strict 248-market WC2026 group-moneyline and knockout-advance universe mapped to FIFA match numbers.
    tests:
      - no_duplicate_grain:
          arguments:
            grain_columns: [market_id]
    columns:
      - name: fifa_match_id
        tests: [not_null]
      - name: market_id
        tests: [not_null, unique]
      - name: international_results_match_id
        tests: [not_null]
      - name: international_results_mapping_count
        tests:
          - accepted_values:
              arguments:
                values: [1]
      - name: yes_clob_token_id
        tests: [not_null, unique]
      - name: no_clob_token_id
        tests: [not_null, unique]
      - name: fixture_mapping_count
        tests:
          - accepted_values:
              arguments:
                values: [1]
      - name: primary_mapping_count
        tests:
          - accepted_values:
              arguments:
                values: [1]

  - name: int_polymarket_wc2026_match_token_minute_odds
    description: Deterministic in-window minute OHLC aggregates at one row per token and UTC minute.
    tests:
      - no_duplicate_grain:
          arguments:
            grain_columns: [clob_token_id, odds_minute_epoch]
      - price_columns_in_unit_interval:
          arguments:
            identifier_columns: [clob_token_id, odds_minute_epoch]
            price_columns: [open_price, high_price, low_price, close_price, average_price]
    columns:
      - name: clob_token_id
        tests: [not_null]
      - name: odds_minute_epoch
        tests: [not_null]
      - name: observed_points
        tests: [not_null]

  - name: int_polymarket_wc2026_match_minute_odds_candidate
    description: Fully dense, null-preserving candidate table validated before public publication.
    tests:
      - no_duplicate_grain:
          arguments:
            grain_columns: [odds_minute_epoch, market_id]
      - price_columns_in_unit_interval:
          arguments:
            identifier_columns: [odds_minute_epoch, market_id]
            price_columns:
              - yes_open_price
              - yes_high_price
              - yes_low_price
              - yes_close_price
              - yes_average_price
              - no_open_price
              - no_high_price
              - no_low_price
              - no_close_price
              - no_average_price
    columns:
      - name: odds_minute_epoch
        tests: [not_null]
      - name: market_id
        tests: [not_null]
      - name: fifa_match_id
        tests: [not_null]
      - name: minute_complete
        tests: [not_null]
      - name: minute_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - complete
                  - start_boundary_incomplete
                  - finish_boundary_incomplete
                  - start_and_finish_boundary_incomplete
                  - interior_incomplete
      - name: pair_price_anomaly
        tests: [not_null]
      - name: is_game_start_minute
        tests: [not_null]
      - name: is_game_finish_minute
        tests: [not_null]

  - name: int_polymarket_wc2026_match_minute_publication_gate
    description: One-row fail-closed quality gate evaluated by the public table query.
    columns:
      - name: publication_ready
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true]

unit_tests:
  - name: test_match_market_universe_orients_group_knockout_third_place_and_final
    model: int_polymarket_wc2026_match_market_universe
    given:
      - input: ref('stg_polymarket_wc2026_markets')
        rows:
          - {market_id: g-home, event_id: group-event, event_slug: group-event, event_title: Mexico vs. South Africa, event_start_time: '2026-06-12 18:00:00', event_finished_time: '2026-06-12 19:40:00', event_ended: true, sports_market_type: moneyline, group_item_title: Mexico, outcomes: '["Yes", "No"]', clob_token_ids: '["g-home-yes", "g-home-no"]', condition_id: g-home-condition, question: Mexico win?, is_closed: true}
          - {market_id: g-draw, event_id: group-event, event_slug: group-event, event_title: Mexico vs. South Africa, event_start_time: '2026-06-12 18:00:00', event_finished_time: '2026-06-12 19:40:00', event_ended: true, sports_market_type: moneyline, group_item_title: Draw (Mexico vs. South Africa), outcomes: '["Yes", "No"]', clob_token_ids: '["g-draw-yes", "g-draw-no"]', condition_id: g-draw-condition, question: Draw?, is_closed: true}
          - {market_id: g-away, event_id: group-event, event_slug: group-event, event_title: Mexico vs. South Africa, event_start_time: '2026-06-12 18:00:00', event_finished_time: '2026-06-12 19:40:00', event_ended: true, sports_market_type: moneyline, group_item_title: South Africa, outcomes: '["Yes", "No"]', clob_token_ids: '["g-away-yes", "g-away-no"]', condition_id: g-away-condition, question: South Africa win?, is_closed: true}
          - {market_id: r-home, event_id: r-primary, event_slug: r-primary, event_title: Brazil vs. Portugal, event_start_time: '2026-07-14 19:00:00', event_finished_time: '2026-07-14 21:05:00', event_ended: true, sports_market_type: moneyline, group_item_title: Brazil, outcomes: '["Yes", "No"]', clob_token_ids: '["r-home-yes", "r-home-no"]', is_closed: true}
          - {market_id: r-draw, event_id: r-primary, event_slug: r-primary, event_title: Brazil vs. Portugal, event_start_time: '2026-07-14 19:00:00', event_finished_time: '2026-07-14 21:05:00', event_ended: true, sports_market_type: moneyline, group_item_title: Draw, outcomes: '["Yes", "No"]', clob_token_ids: '["r-draw-yes", "r-draw-no"]', is_closed: true}
          - {market_id: r-away, event_id: r-primary, event_slug: r-primary, event_title: Brazil vs. Portugal, event_start_time: '2026-07-14 19:00:00', event_finished_time: '2026-07-14 21:05:00', event_ended: true, sports_market_type: moneyline, group_item_title: Portugal, outcomes: '["Yes", "No"]', clob_token_ids: '["r-away-yes", "r-away-no"]', is_closed: true}
          - {market_id: round-advance, event_id: r-more, event_slug: r-more, event_title: Brazil vs. Portugal - More Markets, event_start_time: '2026-07-14 19:00:00', sports_market_type: soccer_team_to_advance, group_item_title: Team to Advance, outcomes: '["Portugal", "Brazil"]', clob_token_ids: '["portugal-token", "brazil-token"]', condition_id: round-condition, question: Team to Advance, is_closed: true}
          - {market_id: t-home, event_id: t-primary, event_slug: t-primary, event_title: Spain vs. Argentina, event_start_time: '2026-07-18 19:00:00', event_finished_time: '2026-07-18 21:10:00', event_ended: true, sports_market_type: moneyline, group_item_title: Spain, outcomes: '["Yes", "No"]', clob_token_ids: '["t-home-yes", "t-home-no"]', is_closed: true}
          - {market_id: t-draw, event_id: t-primary, event_slug: t-primary, event_title: Spain vs. Argentina, event_start_time: '2026-07-18 19:00:00', event_finished_time: '2026-07-18 21:10:00', event_ended: true, sports_market_type: moneyline, group_item_title: Draw, outcomes: '["Yes", "No"]', clob_token_ids: '["t-draw-yes", "t-draw-no"]', is_closed: true}
          - {market_id: t-away, event_id: t-primary, event_slug: t-primary, event_title: Spain vs. Argentina, event_start_time: '2026-07-18 19:00:00', event_finished_time: '2026-07-18 21:10:00', event_ended: true, sports_market_type: moneyline, group_item_title: Argentina, outcomes: '["Yes", "No"]', clob_token_ids: '["t-away-yes", "t-away-no"]', is_closed: true}
          - {market_id: third-advance, event_id: t-more, event_slug: t-more, event_title: Spain vs. Argentina - More Markets, event_start_time: '2026-07-18 19:00:00', sports_market_type: soccer_team_to_advance, group_item_title: Team to Win, outcomes: '["Argentina", "Spain"]', clob_token_ids: '["argentina-token", "spain-token"]', condition_id: third-condition, question: Team to Win, is_closed: true}
          - {market_id: f-home, event_id: f-primary, event_slug: f-primary, event_title: France vs. Germany, event_start_time: '2026-07-19 19:00:00', event_finished_time: '2026-07-19 22:00:00', event_ended: true, sports_market_type: moneyline, group_item_title: France, outcomes: '["Yes", "No"]', clob_token_ids: '["f-home-yes", "f-home-no"]', is_closed: true}
          - {market_id: f-draw, event_id: f-primary, event_slug: f-primary, event_title: France vs. Germany, event_start_time: '2026-07-19 19:00:00', event_finished_time: '2026-07-19 22:00:00', event_ended: true, sports_market_type: moneyline, group_item_title: Draw, outcomes: '["Yes", "No"]', clob_token_ids: '["f-draw-yes", "f-draw-no"]', is_closed: true}
          - {market_id: f-away, event_id: f-primary, event_slug: f-primary, event_title: France vs. Germany, event_start_time: '2026-07-19 19:00:00', event_finished_time: '2026-07-19 22:00:00', event_ended: true, sports_market_type: moneyline, group_item_title: Germany, outcomes: '["Yes", "No"]', clob_token_ids: '["f-away-yes", "f-away-no"]', is_closed: true}
          - {market_id: final-advance, event_id: f-more, event_slug: f-more, event_title: France vs. Germany - More Markets, event_start_time: '2026-07-19 19:00:00', sports_market_type: soccer_team_to_advance, group_item_title: Team to Advance, outcomes: '["Germany", "France"]', clob_token_ids: '["germany-token", "france-token"]', condition_id: final-condition, question: Team to Advance, is_closed: true}
      - input: ref('wc2026_fixtures')
        rows:
          - {match_id: 1, stage: Group Stage, group_label: A, home_team: Mexico, away_team: South Africa, kickoff_at_et: '2026-06-11 15:00:00'}
      - input: ref('international_results_wc2026_matches')
        rows:
          - {match_id: result-group, match_date: '2026-06-11', home_team: South Africa, away_team: Mexico}
          - {match_id: result-round, match_date: '2026-07-14', home_team: Brazil, away_team: Portugal}
          - {match_id: result-third, match_date: '2026-07-18', home_team: Spain, away_team: Argentina}
          - {match_id: result-final, match_date: '2026-07-19', home_team: France, away_team: Germany}
      - input: ref('stg_openfootball_wc2026_knockout_fixtures')
        rows:
          - {fifa_match_id: 101, stage_key: semifinal, home_team: Brazil, away_team: Portugal, kickoff_at_utc: '2026-07-14 19:00:00'}
          - {fifa_match_id: 103, stage_key: third_place, home_team: Spain, away_team: Argentina, kickoff_at_utc: '2026-07-18 19:00:00'}
          - {fifa_match_id: 104, stage_key: final, home_team: France, away_team: Germany, kickoff_at_utc: '2026-07-19 19:00:00'}
      - input: ref('wc2026_team_canonical_aliases')
        rows: []
    expect:
      rows:
        - {fifa_match_id: 1, market_id: g-home, home_team: South Africa, away_team: Mexico, proposition_type: away_win, yes_clob_token_id: g-home-yes, no_clob_token_id: g-home-no}
        - {fifa_match_id: 1, market_id: g-draw, home_team: South Africa, away_team: Mexico, proposition_type: draw, yes_clob_token_id: g-draw-yes, no_clob_token_id: g-draw-no}
        - {fifa_match_id: 1, market_id: g-away, home_team: South Africa, away_team: Mexico, proposition_type: home_win, yes_clob_token_id: g-away-yes, no_clob_token_id: g-away-no}
        - {fifa_match_id: 101, market_id: round-advance, home_team: Brazil, away_team: Portugal, proposition_type: home_advances, yes_clob_token_id: brazil-token, no_clob_token_id: portugal-token}
        - {fifa_match_id: 103, market_id: third-advance, home_team: Spain, away_team: Argentina, proposition_type: home_win_third_place, yes_clob_token_id: spain-token, no_clob_token_id: argentina-token}
        - {fifa_match_id: 104, market_id: final-advance, home_team: France, away_team: Germany, proposition_type: home_wins_final, yes_clob_token_id: france-token, no_clob_token_id: germany-token}

  - name: test_match_token_minute_ohlc_filters_exact_window_and_orders_jitter
    model: int_polymarket_wc2026_match_token_minute_odds
    given:
      - input: ref('int_polymarket_wc2026_match_market_universe')
        rows:
          - {market_id: market-1, yes_clob_token_id: yes-1, no_clob_token_id: no-1, game_started_at_utc: '2026-07-01 12:00:30', game_finished_at_utc: '2026-07-01 12:02:35'}
      - input: ref('stg_polymarket_wc2026_match_minute_odds_history')
        rows:
          - {market_id: market-1, clob_token_id: yes-1, odds_timestamp_epoch: 1782907229, odds_timestamp_utc: '2026-07-01 12:00:29', price: 0.1}
          - {market_id: market-1, clob_token_id: yes-1, odds_timestamp_epoch: 1782907230, odds_timestamp_utc: '2026-07-01 12:00:30', price: 0.2}
          - {market_id: market-1, clob_token_id: yes-1, odds_timestamp_epoch: 1782907250, odds_timestamp_utc: '2026-07-01 12:00:50', price: 0.4}
          - {market_id: market-1, clob_token_id: no-1, odds_timestamp_epoch: 1782907290, odds_timestamp_utc: '2026-07-01 12:01:30', price: 0.6}
          - {market_id: market-1, clob_token_id: yes-1, odds_timestamp_epoch: 1782907356, odds_timestamp_utc: '2026-07-01 12:02:36', price: 0.9}
    expect:
      rows:
        - {clob_token_id: yes-1, odds_minute_epoch: 1782907200, open_price: 0.2, high_price: 0.4, low_price: 0.2, close_price: 0.4, average_price: 0.3, observed_points: 2}
        - {clob_token_id: no-1, odds_minute_epoch: 1782907260, open_price: 0.6, high_price: 0.6, low_price: 0.6, close_price: 0.6, average_price: 0.6, observed_points: 1}

  - name: test_match_minute_candidate_keeps_dense_null_minutes_without_fill
    model: int_polymarket_wc2026_match_minute_odds_candidate
    given:
      - input: ref('int_polymarket_wc2026_match_market_universe')
        rows:
          - {fifa_match_id: 104, market_id: market-1, condition_id: condition-1, selected_market_event_id: more-1, selected_market_event_slug: more-1, primary_timing_event_id: primary-1, primary_timing_event_slug: primary-1, stage: final, group_label: null, home_team: Spain, away_team: Argentina, game_started_at_utc: '2026-07-01 12:00:30', game_finished_at_utc: '2026-07-01 12:02:35', sports_market_type: soccer_team_to_advance, proposition_type: home_wins_final, question: Team to Advance, yes_represents: Spain wins, no_represents: Argentina wins, yes_team_name: Spain, no_team_name: Argentina, yes_clob_token_id: yes-1, no_clob_token_id: no-1}
      - input: ref('int_polymarket_wc2026_match_token_minute_odds')
        rows:
          - {clob_token_id: yes-1, odds_minute_utc: '2026-07-01 12:00:00', odds_minute_epoch: 1782907200, open_price: 0.4, high_price: 0.4, low_price: 0.4, close_price: 0.4, average_price: 0.4, observed_points: 1, first_observed_at: '2026-07-01 12:00:30', last_observed_at: '2026-07-01 12:00:30'}
          - {clob_token_id: no-1, odds_minute_utc: '2026-07-01 12:01:00', odds_minute_epoch: 1782907260, open_price: 0.6, high_price: 0.6, low_price: 0.6, close_price: 0.6, average_price: 0.6, observed_points: 1, first_observed_at: '2026-07-01 12:01:30', last_observed_at: '2026-07-01 12:01:30'}
    expect:
      rows:
        - {odds_minute_epoch: 1782907200, yes_close_price: 0.4, no_close_price: null, yes_observed_points: 1, no_observed_points: 0, yes_observed: true, no_observed: false, minute_complete: false, is_game_start_minute: true, is_game_finish_minute: false, minute_status: start_boundary_incomplete, pair_price_anomaly: false}
        - {odds_minute_epoch: 1782907260, yes_close_price: null, no_close_price: 0.6, yes_observed_points: 0, no_observed_points: 1, yes_observed: false, no_observed: true, minute_complete: false, is_game_start_minute: false, is_game_finish_minute: false, minute_status: interior_incomplete, pair_price_anomaly: false}
        - {odds_minute_epoch: 1782907320, yes_close_price: null, no_close_price: null, yes_observed_points: 0, no_observed_points: 0, yes_observed: false, no_observed: false, minute_complete: false, is_game_start_minute: false, is_game_finish_minute: true, minute_status: finish_boundary_incomplete, pair_price_anomaly: false}

  - name: test_match_minute_candidate_flags_raw_close_pair_deviation
    model: int_polymarket_wc2026_match_minute_odds_candidate
    given:
      - input: ref('int_polymarket_wc2026_match_market_universe')
