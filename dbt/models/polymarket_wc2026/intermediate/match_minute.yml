          - {fifa_match_id: 1, market_id: market-1, condition_id: condition-1, selected_market_event_id: event-1, selected_market_event_slug: event-1, primary_timing_event_id: event-1, primary_timing_event_slug: event-1, stage: group_stage, home_team: Japan, away_team: Sweden, scheduled_kickoff_at_utc: '2026-07-01 12:00:00', game_started_at_utc: '2026-07-01 12:00:05', game_finished_at_utc: '2026-07-01 12:00:55', sports_market_type: moneyline, proposition_type: home_win, question: Japan win?, yes_represents: Japan wins, no_represents: Japan does not win, yes_team_name: Japan, yes_clob_token_id: yes-1, no_clob_token_id: no-1}
