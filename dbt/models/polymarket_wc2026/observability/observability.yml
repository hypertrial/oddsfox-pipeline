version: 2

models:
  - name: polymarket_wc2026_match_minute_token_coverage
    description: Latest fetch and raw-observation coverage at one row per mapped token.
    tests:
      - no_duplicate_grain:
          arguments:
            grain_columns: [clob_token_id]
    columns:
      - name: clob_token_id
        tests: [not_null, unique]
      - name: token_side
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['yes', 'no']
      - name: expected_minute_buckets
        tests: [not_null]
      - name: observation_to_minute_ratio
        tests: [not_null]

  - name: polymarket_wc2026_match_minute_odds_quality_issues
    description: Current structural errors and nonblocking source-quality warnings for the match-minute candidate.
    tests:
      - no_duplicate_grain:
          arguments:
            grain_columns: [issue_key]
    columns:
      - name: issue_key
        tests: [not_null, unique]
      - name: severity
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['warn', 'error']
      - name: issue_type
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['pair_price', 'minute_completeness', 'cadence', 'timing', 'price', 'ohlc', 'fetch', 'history', 'provenance']
      - name: issue_detail
        tests: [not_null]
      - name: observed_at
        tests: [not_null]

  - name: polymarket_wc2026_match_minute_odds_data_quality
    description: Publication inventory, international-results alignment, mapping, timing, history, spine, and null-minute quality summary.
    columns:
      - name: expected_games
        tests: [not_null]
      - name: mapped_games
        tests: [not_null]
      - name: international_results_games
        description: Latest WC2026 fixture/result rows available from international_results.
        tests: [not_null]
      - name: international_results_mapped_games
        description: FIFA-numbered mart games with one matching international_results row.
        tests: [not_null]
      - name: international_results_mapped_source_games
        description: Distinct international_results rows matched into the mart universe.
        tests: [not_null]
      - name: international_results_mapping_issues
        description: FIFA-numbered games without exactly one international_results match.
        tests: [not_null]
      - name: blocking_issue_keys
        description: Comma-separated blocking invariant keys, null for an empty offline source or a valid complete inventory.
      - name: non_finish_minute_completeness_ratio
        description: Completeness excluding the inclusive final-whistle minute bucket.
      - name: interior_minute_completeness_ratio
        description: Completeness excluding both start and finish boundary buckets.
      - name: pair_price_anomaly_minutes
        description: Complete minute rows whose raw Yes/No closes deviate from one by more than 0.05.
      - name: latest_fetch_audited_tokens
        description: Token audit rows in the latest dedicated fetch run.
      - name: latest_fetch_run_status
        description: Missing, partial, failed, unpublished, or fully published latest fetch state.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['missing', 'partial', 'failed', 'unpublished', 'published']
      - name: warning_issue_count
        description: Current nonblocking detailed quality findings.
      - name: error_issue_count
        description: Current structural detailed quality findings.

  - name: polymarket_wc2026_knockout_stage_coverage
    description: >
      WC2026 knockout source and public-token coverage by stage, direction, and derived market status.
      Use this to distinguish sparse upstream market availability from public mart filtering.
    tests:
      - no_duplicate_grain:
          arguments:
            grain_columns: [stage_key, market_direction, market_status]
    columns:
      - name: stage_key
        description: Normalized WC2026 knockout stage key.
        tests: [not_null]
      - name: stage_rank
        description: Numeric ordering for knockout stages.
        tests: [not_null]
      - name: market_direction
        description: Source market wording direction.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['winner', 'advance', 'elimination']
      - name: market_status
        description: Derived market state bucket.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['resolved', 'closed', 'live', 'inactive']
      - name: raw_classified_markets
        description: Raw loaded markets whose question matched the knockout classifier.
      - name: raw_classified_markets_ge_floor
        description: Raw classified markets with reported volume at or above the WC2026 contract floor.
      - name: raw_source_state_anomaly_markets
        description: Raw classified markets where source flags are both active and closed.
      - name: scoped_markets
        description: Public scoped knockout markets for this stage/direction/status bucket.
      - name: scoped_tokens
        description: Public scoped progression-side tokens for this bucket.
      - name: tokens_with_hourly_odds
        description: Scoped tokens with at least one trailing 30-day hourly odds row.
      - name: tokens_missing_hourly_odds
        description: Scoped tokens without trailing 30-day hourly odds rows.
      - name: source_state_anomaly_tokens
        description: Scoped tokens where source flags are both active and closed.
      - name: hourly_rows
        description: Total trailing-window hourly rows available for scoped tokens in this bucket.
      - name: expected_hourly_rows
        description: Scoped token count multiplied by the WC2026 contract hourly window.
        tests: [not_null]
      - name: avg_hourly_rows_per_token
        description: Average trailing-window hourly row count per scoped token in this bucket.
        tests: [not_null]
      - name: min_hourly_rows_per_token
        description: Minimum trailing-window hourly row count across scoped tokens in this bucket.
        tests: [not_null]
      - name: max_hourly_rows_per_token
        description: Maximum trailing-window hourly row count across scoped tokens in this bucket.
        tests: [not_null]
      - name: hourly_completeness_ratio
        description: Observed hourly rows divided by expected rows from the WC2026 contract window.
        tests: [not_null]
      - name: latest_hour_utc
        description: Latest hourly odds bucket available for this bucket.
      - name: observed_at
        description: dbt build timestamp when this coverage row was produced.
        tests: [not_null]

  - name: polymarket_wc2026_knockout_data_quality
    description: >
      WC2026 knockout DQ findings for source-state anomalies, sparse stage coverage,
      missing/stale hourly odds, and impossible derived contract states.
    tests:
      - no_duplicate_grain:
          arguments:
            grain_columns: [issue_key]
    columns:
      - name: issue_key
        description: Stable issue key for the observed DQ finding.
        tests: [not_null, unique]
      - name: severity
        description: Issue severity; error rows indicate broken public contracts.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['warn', 'error']
      - name: entity_type
        description: Entity type for the finding.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['token', 'stage', 'team']
      - name: market_id
        description: Market id when the issue is token-level.
      - name: clob_token_id
        description: CLOB token id when the issue is token-level.
      - name: stage_key
        description: Normalized knockout stage tied to the issue.
      - name: team_name
        description: Team tied to token-level issues.
      - name: market_status
        description: Derived market state tied to token-level issues.
      - name: issue_detail
        description: Human-readable explanation of the finding.
        tests: [not_null]
      - name: issue_count
        description: Number of source rows, tokens, teams, or expected coverage items represented by this issue row.
        tests: [not_null]
      - name: observed_at
        description: dbt build timestamp when this finding was produced.
        tests: [not_null]

  - name: polymarket_wc2026_sync_run_observability
    description: >
      One row per relevant pipeline run event with typed observability metrics for odds sync planning, execution,
      and pre-run token coverage context.
      Rows still reflect whatever the ingestion task wrote into ``metrics_json``; planning-context counters such as
      ``ledger_fully_checked_tokens`` and ratios like ``fully_checked_vs_market_tokens_ratio`` can read as zero when
      the emitter omits those fields rather than implying the warehouse suppressed them.
    columns:
      - name: run_id
        description: UUID primary key for the underlying pipeline run event.
        tests: [not_null, unique]
      - name: task_name
        description: Pipeline task that emitted the observability metrics row.
        tests: [not_null]
      - name: recorded_at
        description: UTC timestamp when the run event was recorded.
        tests: [not_null]
      - name: scope_name
        description: Market scope name for market discovery runs.
      - name: discovery_mode
        description: Polymarket market discovery mode for market discovery runs.
      - name: effective_keyset_tag_slugs
        description: Effective keyset tag slugs used by market discovery after seed/env resolution.
      - name: keyset_closed
        description: Closed-market filter sent to Gamma keyset discovery.
      - name: keyset_volume_min
        description: Minimum volume sent to Gamma keyset discovery.
      - name: registry_refreshed
        description: Whether market discovery refreshed the market-scope registry.
      - name: events_pages
        description: Number of event pages scanned by market discovery.
      - name: api_requests
        description: Number of Gamma API requests reported by market discovery.
      - name: markets_collected
        description: Number of normalized market rows collected during market discovery.
      - name: token_rows_collected
        description: Number of raw market-token mapping rows collected during market discovery.
      - name: total_fetched
        description: Total market rows fetched by market discovery.
      - name: is_noop
        description: Whether the task concluded that no work was required.
      - name: duration_seconds
        description: End-to-end duration of the task in seconds when recorded.
      - name: planned_tokens
        description: Number of token plans created before execution began.
      - name: processed_tokens
        description: Number of tokens actually processed by the execution phase.
      - name: rows_fetched
        description: Number of raw odds rows fetched during the run.
      - name: windows_processed
        description: Number of time windows processed across all tokens.
      - name: empty_tokens
        description: Number of processed tokens that completed with no fetched rows.
      - name: error_tokens
        description: Number of processed tokens that encountered errors during execution.
      - name: permanent_error_tokens
        description: Number of processed tokens that encountered permanent execution errors.
      - name: invalid_tokens
        description: Count of invalid token identifiers encountered while planning the run.
      - name: saved_rows
        description: Number of odds rows written into raw `odds_history`.
      - name: saved_daily_rows
        description: Number of daily aggregate rows written into raw `token_odds_daily`.
      - name: sync_updates
        description: Number of ledger cursor/state updates written during the run.
      - name: queue_high_watermark
        description: Peak writer queue depth observed during the run.
      - name: http_requests
        description: Number of HTTP requests observed by the runtime.
      - name: http_429
        description: Number of HTTP 429 responses observed by the runtime.
      - name: http_errors
        description: Number of HTTP responses counted as errors by the runtime.
      - name: final_rps
        description: Final requests-per-second rate after any auto-tuning adjustments.
      - name: token_rate
        description: Processed-token throughput in tokens per second.
      - name: row_rate
        description: Raw-row throughput in rows per second.
      - name: market_tokens_distinct_tokens
        description: Distinct token count extracted from raw `market_tokens` at run start.
      - name: odds_history_distinct_tokens
        description: Distinct token count already present in raw `odds_history` at run start.
      - name: token_odds_daily_distinct_tokens
        description: Distinct token count already present in raw `token_odds_daily` at run start.
      - name: ledger_distinct_tokens
        description: Distinct token count present in raw `token_sync_ledger` at run start.
      - name: ledger_fully_checked_tokens
        description: >
          Count from planning_context emitted by ingestion (often zero rows if the snapshot field was not populated).
      - name: token_sync_skips_distinct_tokens
        description: Distinct token count present in raw `token_sync_skips` at run start.
      - name: market_tokens_without_history
        description: Number of metadata tokens missing any raw history at run start.
      - name: history_tokens_without_market_tokens
        description: Number of raw history tokens not present in current metadata at run start.
      - name: pre_clob_markets
        description: Count of markets excluded because they predate the configured CLOB cutoff.
      - name: invalid_tokens_from_planning
        description: Invalid token count reported by the planner state.
      - name: closed_done_tokens
        description: Count of closed tokens skipped because they were already fully checked.
      - name: persisted_skip_tokens
        description: Count of tokens skipped because of persisted skip reasons.
      - name: recent_skip_tokens
        description: Count of tokens skipped because their latest sync timestamp was still recent.
      - name: empty_cache_skip_tokens
        description: Count of tokens deferred because of empty-result retry budgeting.
      - name: already_current_tokens
        description: Count of tokens skipped because their computed sync window was already current.
      - name: duplicate_tokens
        description: Count of duplicate token IDs ignored during planning.
      - name: planned_vs_market_tokens_ratio
        description: Ratio of planned tokens to distinct metadata tokens at run start.
      - name: history_coverage_vs_market_tokens_ratio
        description: Ratio of history-covered tokens to distinct metadata tokens at run start.
      - name: daily_coverage_vs_market_tokens_ratio
        description: Ratio of daily-covered tokens to distinct metadata tokens at run start.
      - name: ledger_coverage_vs_market_tokens_ratio
        description: Ratio of ledger-covered tokens to distinct metadata tokens at run start.
      - name: fully_checked_vs_market_tokens_ratio
        description: >
          Planning snapshot ratio emitted by ingestion; may be blank or zero depending on planner payload—not derived
          from a live recount in dbt.
      - name: rows_per_processed_token
        description: Average fetched raw-row volume per processed token for the run.

unit_tests:
  - name: test_match_minute_token_coverage_calibrates_strict_cadence_thresholds
    model: polymarket_wc2026_match_minute_token_coverage
    given:
      - input: ref('int_polymarket_wc2026_match_market_universe')
        rows:
          - {fifa_match_id: 1, market_id: market-1, yes_clob_token_id: yes-1, no_clob_token_id: no-1, game_started_at_utc: '2026-07-01 12:00:00', game_finished_at_utc: '2026-07-01 12:05:00'}
      - input: ref('stg_polymarket_wc2026_match_minute_fetch_audit')
        rows:
          - {fetch_run_id: run-1, clob_token_id: yes-1, fetch_status: success, raw_published: true, source_row_count: 2, in_game_row_count: 2, fetch_finished_at: '2026-07-21 12:00:00'}
          - {fetch_run_id: run-1, clob_token_id: no-1, fetch_status: success, raw_published: true, source_row_count: 2, in_game_row_count: 2, fetch_finished_at: '2026-07-21 12:00:00'}
      - input: ref('stg_polymarket_wc2026_match_minute_odds_history')
        rows:
          - {clob_token_id: yes-1, odds_timestamp_epoch: 1782907320, price: 0.4}
          - {clob_token_id: yes-1, odds_timestamp_epoch: 1782907441, price: 0.6}
          - {clob_token_id: no-1, odds_timestamp_epoch: 1782907321, price: 0.5}
          - {clob_token_id: no-1, odds_timestamp_epoch: 1782907380, price: 0.5}
    expect:
      rows:
        - {clob_token_id: yes-1, expected_minute_buckets: 6, raw_observation_count: 2, observed_minute_buckets: 2, first_observation_offset_seconds: 120, last_observation_offset_seconds: 59, max_observation_gap_seconds: 121, distinct_price_count: 2, cadence_gap_warning: true, first_boundary_offset_warning: false, last_boundary_offset_warning: false, constant_price_warning: false}
        - {clob_token_id: no-1, expected_minute_buckets: 6, raw_observation_count: 2, observed_minute_buckets: 2, first_observation_offset_seconds: 121, last_observation_offset_seconds: 120, max_observation_gap_seconds: 59, distinct_price_count: 1, cadence_gap_warning: false, first_boundary_offset_warning: true, last_boundary_offset_warning: false, constant_price_warning: true}

  - name: test_match_minute_quality_issues_apply_warning_and_error_thresholds
    model: polymarket_wc2026_match_minute_odds_quality_issues
    given:
      - input: ref('int_polymarket_wc2026_match_market_universe')
        rows:
          - {fifa_match_id: 1, market_id: market-1, stage: group_stage, scheduled_kickoff_at_utc: '2026-07-01 12:00:00', game_started_at_utc: '2026-07-01 13:00:00', game_finished_at_utc: '2026-07-01 15:30:00', results_source_revision: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa, results_source_payload_sha256: bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb}
          - {fifa_match_id: 104, market_id: market-2, stage: final, scheduled_kickoff_at_utc: '2026-07-01 12:00:00', game_started_at_utc: '2026-07-01 13:00:01', game_finished_at_utc: '2026-07-01 16:30:02', results_source_revision: bad, results_source_payload_sha256: bad}
      - input: ref('int_polymarket_wc2026_match_minute_odds_candidate')
        rows:
          - {fifa_match_id: 1, market_id: market-boundary, odds_minute_epoch: 1, yes_no_close_deviation: 0.05, pair_price_anomaly: false, minute_status: complete}
          - {fifa_match_id: 1, market_id: market-pair, odds_minute_epoch: 2, yes_no_close_deviation: 0.0501, pair_price_anomaly: true, minute_status: complete}
          - {fifa_match_id: 1, market_id: market-gap, odds_minute_epoch: 3, pair_price_anomaly: false, minute_status: interior_incomplete}
          - {fifa_match_id: 1, market_id: market-price, odds_minute_epoch: 4, pair_price_anomaly: false, minute_status: complete, yes_observed: true, yes_open_price: 1.1, yes_high_price: 1.1, yes_low_price: 1.1, yes_close_price: 1.1, yes_average_price: 1.1}
          - {fifa_match_id: 1, market_id: market-ohlc, odds_minute_epoch: 5, pair_price_anomaly: false, minute_status: complete, yes_observed: true, yes_open_price: 0.5, yes_high_price: 0.4, yes_low_price: 0.6, yes_close_price: 0.5, yes_average_price: 0.5}
      - input: ref('polymarket_wc2026_match_minute_token_coverage')
        rows:
          - {fifa_match_id: 1, market_id: market-1, clob_token_id: token-warning, latest_fetch_run_id: run-1, latest_fetch_status: success, latest_fetch_raw_published: true, raw_observation_count: 2, max_observation_gap_seconds: 121, first_observation_offset_seconds: 121, last_observation_offset_seconds: 121, distinct_price_count: 1, cadence_gap_warning: true, first_boundary_offset_warning: true, last_boundary_offset_warning: true, constant_price_warning: true}
          - {fifa_match_id: 104, market_id: market-2, clob_token_id: token-missing, latest_fetch_run_id: null, latest_fetch_status: null, latest_fetch_raw_published: false, raw_observation_count: 0, cadence_gap_warning: false, first_boundary_offset_warning: false, last_boundary_offset_warning: false, constant_price_warning: false}
    expect:
      rows:
        - {issue_key: 'pair_price_anomaly:market-pair:2', severity: warn, issue_type: pair_price}
        - {issue_key: 'interior_incomplete:market-gap:3', severity: warn, issue_type: minute_completeness}
        - {issue_key: 'cadence_gap:token-warning', severity: warn, issue_type: cadence}
        - {issue_key: 'first_boundary_offset:token-warning', severity: warn, issue_type: cadence}
        - {issue_key: 'last_boundary_offset:token-warning', severity: warn, issue_type: cadence}
        - {issue_key: 'constant_price:token-warning', severity: warn, issue_type: cadence}
        - {issue_key: 'kickoff_shift:104', severity: warn, issue_type: timing}
        - {issue_key: 'game_window:104', severity: warn, issue_type: timing}
        - {issue_key: 'invalid_price:market-price:4', severity: error, issue_type: price}
        - {issue_key: 'invalid_ohlc:market-ohlc:5', severity: error, issue_type: ohlc}
        - {issue_key: 'fetch_not_published:missing:token-missing', severity: error, issue_type: fetch}
        - {issue_key: 'missing_token_history:token-missing', severity: error, issue_type: history}
        - {issue_key: 'results_provenance:104', severity: error, issue_type: provenance}

  - name: test_match_minute_warning_only_issues_do_not_block_publication
    model: polymarket_wc2026_match_minute_odds_data_quality
    given:
      - input: ref('stg_polymarket_wc2026_markets')
        rows: []
      - input: ref('int_polymarket_wc2026_match_market_universe')
        rows: []
      - input: ref('int_polymarket_wc2026_match_token_minute_odds')
        rows: []
      - input: ref('int_polymarket_wc2026_match_minute_odds_candidate')
        rows: []
      - input: ref('stg_polymarket_wc2026_match_minute_fetch_audit')
        rows: []
      - input: ref('polymarket_wc2026_match_minute_token_coverage')
        rows: []
      - input: ref('polymarket_wc2026_match_minute_odds_quality_issues')
        rows:
          - {severity: warn, issue_type: pair_price}
      - input: ref('international_results_wc2026_matches')
        rows: []
    expect:
      rows:
        - {warning_issue_count: 1, error_issue_count: 0, latest_fetch_run_status: missing, blocking_issue_keys: null}

  - name: test_match_minute_data_quality_counts_tokens_across_both_sides
    model: polymarket_wc2026_match_minute_odds_data_quality
    given:
      - input: ref('stg_polymarket_wc2026_markets')
        rows:
          - {market_id: market-1, is_closed: true, sports_market_type: moneyline}
      - input: ref('int_polymarket_wc2026_match_market_universe')
        rows:
          - {fifa_match_id: 1, market_id: market-1, stage: group_stage, yes_clob_token_id: shared-token, no_clob_token_id: shared-token, fixture_mapping_count: 2, primary_mapping_count: 1, game_started_at_utc: null, game_finished_at_utc: null}
      - input: ref('int_polymarket_wc2026_match_token_minute_odds')
        rows: []
      - input: ref('int_polymarket_wc2026_match_minute_odds_candidate')
        rows:
          - {fifa_match_id: 1, market_id: market-price, odds_minute_epoch: 1, yes_observed: true, yes_open_price: 1.1, yes_high_price: 1.1, yes_low_price: 1.1, yes_close_price: 1.1, yes_average_price: 1.1}
          - {fifa_match_id: 1, market_id: market-ohlc, odds_minute_epoch: 2, yes_observed: true, yes_open_price: 0.5, yes_high_price: 0.4, yes_low_price: 0.6, yes_close_price: 0.5, yes_average_price: 0.5}
      - input: ref('stg_polymarket_wc2026_match_minute_fetch_audit')
        rows: []
      - input: ref('polymarket_wc2026_match_minute_token_coverage')
        rows: []
      - input: ref('polymarket_wc2026_match_minute_odds_quality_issues')
        rows: []
      - input: ref('international_results_wc2026_matches')
        rows: []
    expect:
      rows:
        - {mapped_tokens: 1, ambiguous_mappings: 1, missing_timing: 1, invalid_price_rows: 1, invalid_ohlc_rows: 1, blocking_issue_keys: 'game_count,fifa_id_coverage,market_count,group_market_count,knockout_market_count,token_count,token_history,fetch_audit,international_results_game_count,international_results_mart_coverage,international_results_source_coverage,international_results_provenance,ambiguous_mapping,missing_timing,invalid_price,invalid_ohlc'}
