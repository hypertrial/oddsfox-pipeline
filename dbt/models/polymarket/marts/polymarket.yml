version: 2

models:
  - name: market_coverage
    description: >
      Market-level coverage rolled up from token_coverage; one row per (market_id, question, event_slug)
      with aggregates over all outcome tokens in the token health mart.
    columns:
      - name: market_id
        description: Polymarket market identifier.
        tests: [not_null, unique]
      - name: question
        description: Market prompt text (grouping key; same semantics as staging markets).
      - name: event_slug
        description: Event slug for grouping related markets (grouping key).
      - name: token_count
        description: Count of distinct CLOB outcome tokens for the market in the joined time series.
        tests: [not_null]
      - name: token_days_observed
        description: Total count of observed token-days (sum of token-day rows with non-null daily odds) across all tokens for the market.
      - name: first_odds_date
        description: Earliest UTC day with observed odds for the market.
      - name: last_odds_date
        description: Latest UTC day with observed odds for the market.
      - name: has_odds_data
        description: 1 if any daily odds row exists for the market, else 0.

  - name: token_coverage
    description: >
      Token-level health and coverage mart; one row per CLOB outcome token with market labels, daily coverage,
      sync ledger state, persisted skip reason, gap diagnostics, and market-level fully checked rollups.
    columns:
      - name: clob_token_id
        description: CLOB outcome token identifier (primary key for this mart).
        tests: [not_null, unique]
      - name: market_id
        description: Polymarket market identifier for this outcome token.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_polymarket_markets')
                field: market_id
      - name: outcome_index
        description: Zero-based index of the outcome within the market token list.
        tests: [not_null]
      - name: question
        description: Market prompt text from staging markets.
      - name: event_slug
        description: Event slug for grouping related markets.
      - name: is_active
        description: Whether the market is active in the latest scrape.
      - name: is_closed
        description: Whether the market is closed in the latest scrape.
      - name: first_odds_date
        description: Earliest UTC calendar day with non-null daily odds for this token.
      - name: last_odds_date
        description: Latest UTC calendar day with non-null daily odds for this token.
      - name: token_days_observed
        description: Count of token-day rows with non-null daily odds for this token.
        tests: [not_null]
      - name: sum_observed_points
        description: Sum of observed_points from daily rows for this token (0 when no daily history).
        tests: [not_null]
      - name: has_daily_odds
        description: 1 if at least one daily odds row exists for this token, else 0.
        tests: [not_null]
      - name: is_fully_checked
        description: Whether ingestion marked this token's odds history as fully checked (sync ledger).
      - name: last_sync_timestamp
        description: Raw epoch seconds of the last successful sync boundary for this token.
      - name: last_sync_at
        description: Timestamp derived from last_sync_timestamp for this token.
      - name: last_checked_at
        description: UTC timestamp when odds sync last evaluated this token.
      - name: next_check_at
        description: UTC timestamp when this token next becomes eligible for routine odds syncing.
      - name: empty_run_streak
        description: Count of consecutive routine syncs that completed with no rows and no errors.
      - name: has_persisted_skip
        description: True when the token has a persisted skip reason.
        tests: [not_null]
      - name: skip_reason
        description: Persisted skip reason for tokens ingestion will not retry until cleared.
      - name: skip_created_at
        description: UTC timestamp when the persisted skip row was first inserted.
      - name: max_gap_days
        description: Largest gap in days between consecutive non-null daily observations.
        tests: [not_null]
      - name: avg_gap_days
        description: Average gap in days between consecutive non-null daily observations.
      - name: market_token_count
        description: Number of outcome tokens for this token's market.
        tests: [not_null]
      - name: market_fully_checked_tokens
        description: Count of outcome tokens in this market whose sync ledger row is fully checked.
        tests: [not_null]
      - name: market_fully_checked
        description: True when the market has at least one token and every token is fully checked.
        tests: [not_null]

  - name: selected_token_minutely_odds
    description: >
      Full minutely odds time series for all selected-scope CLOB outcome tokens.
      One row per (clob_token_id, odds_timestamp_epoch) with market labels and volume from the selected-scope token universe.
      Materialized as a dbt view (not a table) to avoid duplicating raw odds_history on disk.
    tests:
      - price_in_unit_interval:
          arguments:
            identifier_columns: [clob_token_id, odds_timestamp_epoch]
    columns:
      - name: clob_token_id
        description: CLOB outcome token identifier.
        tests: [not_null]
      - name: market_id
        description: Polymarket market identifier.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('selected_markets')
                field: market_id
      - name: outcome_label
        description: Resolved outcome label (e.g. Yes/No) from the market's outcomes array at outcome_index; null if the outcomes array is missing or malformed.
      - name: market_volume_usd
        description: Reported market volume at build time.
      - name: odds_timestamp_epoch
        description: Unix epoch seconds for the minutely observation.
        tests: [not_null]
      - name: price
        description: Outcome price in [0, 1].
        tests: [not_null]

  - name: selected_token_daily_odds
    description: >
      Full daily OHLC odds time series for all selected-scope CLOB outcome tokens.
      One row per (clob_token_id, odds_date_utc) with market labels and volume from the selected-scope token universe.
      Materialized as a dbt view (not a table) to avoid duplicating int daily history on disk.
    tests:
      - no_duplicate_grain:
          arguments:
            grain_columns: [clob_token_id, odds_date_utc]
            where: clob_token_id is not null and odds_date_utc is not null
      - price_columns_in_unit_interval:
          arguments:
            identifier_columns: [clob_token_id, odds_date_utc]
            price_columns:
              - open_price
              - high_price
              - low_price
              - close_price
              - avg_price
    columns:
      - name: clob_token_id
        description: CLOB outcome token identifier.
        tests: [not_null]
      - name: market_id
        description: Polymarket market identifier.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('selected_markets')
                field: market_id
      - name: outcome_label
        description: Resolved outcome label (e.g. Yes/No) from the market's outcomes array at outcome_index; null if the outcomes array is missing or malformed.
      - name: odds_date_utc
        description: UTC calendar date for the aggregated token odds row.
        tests: [not_null]
      - name: close_price
        description: Closing price for the token on this UTC day.

  - name: selected_token_hourly_odds
    description: >
      Full hourly OHLC odds time series for all selected-scope CLOB outcome tokens.
      One row per (clob_token_id, odds_hour_utc) with market labels and volume from the selected-scope token universe.
      Materialized as a dbt view (not a table) to avoid duplicating raw odds_history on disk.
    columns:
      - name: clob_token_id
        description: CLOB outcome token identifier.
      - name: market_id
        description: Polymarket market identifier.
      - name: outcome_label
        description: Resolved outcome label (e.g. Yes/No) from the market's outcomes array at outcome_index; null if the outcomes array is missing or malformed.
      - name: odds_hour_utc
        description: UTC hour for the aggregated token odds row.
      - name: odds_hour_epoch
        description: Unix epoch seconds for the start of odds_hour_utc.
      - name: close_price
        description: Closing price for the token in this UTC hour.
      - name: observed_points
        description: Count of canonical odds points rolled into this token-hour.

  - name: selected_token_live_hourly_odds
    description: >
      Graph-ready hourly OHLC odds time series for live-current selected-scope markets.
      This view preserves the selected_token_hourly_odds schema and keeps full hourly history only
      for markets whose latest complete hour is active, not closed, and within
      polymarket_live_current_max_age_hours of the mart's global max hour.
    columns:
      - name: clob_token_id
        description: CLOB outcome token identifier.
      - name: market_id
        description: Polymarket market identifier.
      - name: outcome_label
        description: Resolved outcome label (e.g. Yes/No) from the market's outcomes array at outcome_index; null if the outcomes array is missing or malformed.
      - name: odds_hour_utc
        description: UTC hour for the aggregated token odds row.
      - name: odds_hour_epoch
        description: Unix epoch seconds for the start of odds_hour_utc.
      - name: close_price
        description: Closing price for the token in this UTC hour.
      - name: observed_points
        description: Count of canonical odds points rolled into this token-hour.

  - name: wc2026_knockout_markets
    description: >
      WC2026 knockout-stage market/token export surface with stage classification,
      Polymarket sports metadata, latest live-current hourly price, and raw result
      metadata. One row per CLOB token for stage markets.
    tests:
      - no_duplicate_grain:
          arguments:
            grain_columns: [clob_token_id]
    columns:
      - name: clob_token_id
        description: CLOB outcome token identifier.
        tests: [not_null, unique]
      - name: market_id
        description: Polymarket market identifier.
        tests: [not_null]
      - name: stage_key
        description: Normalized WC2026 knockout stage key.
        tests: [not_null]
      - name: team_name
        description: Team extracted from the market question.
      - name: condition_id
        description: Polymarket condition identifier when present.
      - name: sports_market_type
        description: Polymarket sports market type when present.
      - name: game_start_time
        description: Scheduled game start time when present.
      - name: group_item_title
        description: Polymarket sports grouping title when present.
      - name: current_price
        description: Latest live-current hourly close price for this token.

  - name: selected_whale_minutely_odds
    description: >
      Minute-grain odds for high-liquidity selected-scope markets (volume >= polymarket_whale_min_volume_usd).
      Filtered view over selected_token_minutely_odds; one row per (clob_token_id, odds_timestamp_epoch).
      Materialized as a dbt view (not a table) to avoid duplicating raw odds_history on disk.
    tests:
      - price_in_unit_interval:
          arguments:
            identifier_columns: [clob_token_id, odds_timestamp_epoch]
    columns:
      - name: clob_token_id
        description: CLOB outcome token identifier.
        tests: [not_null]
      - name: market_id
        description: Polymarket market identifier.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('selected_markets')
                field: market_id
      - name: outcome_label
        description: Resolved outcome label (e.g. Yes/No) from the market's outcomes array at outcome_index; null if the outcomes array is missing or malformed.
      - name: market_volume_usd
        description: Reported market volume at build time (>= whale threshold).
      - name: odds_timestamp_epoch
        description: Unix epoch seconds for the minutely observation.
        tests: [not_null]
      - name: price
        description: Outcome price in [0, 1].
        tests: [not_null]

  - name: selected_markets
    description: >
      Selected-scope Polymarket market universe; one row per (scope_name, market_id)
      admitted by int_polymarket_selected_markets.
    tests:
      - no_duplicate_grain:
          arguments:
            grain_columns: [scope_name, market_id]
    columns:
      - name: market_id
        description: Polymarket market identifier.
        tests: [not_null]
      - name: scope_name
        description: Selected market scope that admitted this market row.
        tests: [not_null]
      - name: question
        description: Market prompt or title text shown to users.
      - name: description
        description: Longer market description body when provided by the source.
      - name: category
        description: Market category label when present in source metadata.
      - name: outcomes
        description: Outcomes payload as stored in source market metadata.
      - name: volume
        description: Reported trading volume for the market when present in source metadata.
      - name: is_active
        description: Whether the market is active in Polymarket metadata.
      - name: is_closed
        description: Whether the market is closed in Polymarket metadata.
      - name: created_at
        description: Market creation timestamp from source metadata when present.
      - name: scraped_at
        description: Ingestion scrape timestamp when the pipeline recorded this market row.
      - name: end_date
        description: Market resolution or end date from metadata when present.
      - name: slug
        description: URL-friendly market slug for the single market.
      - name: event_slug
        description: Event slug for grouping related markets under one event.
