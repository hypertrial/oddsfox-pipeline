version: 2

models:
  - name: wc2026_markets
    description: WC2026 Polymarket market universe, one row per (scope_name, market_id).
    tests:
      - no_duplicate_grain:
          arguments:
            grain_columns: [scope_name, market_id]
    columns:
      - name: scope_name
        description: Scope name, fixed to wc2026.
        tests: [not_null]
      - name: market_id
        description: Polymarket market identifier.
        tests: [not_null]

  - name: wc2026_market_tokens
    description: WC2026 Polymarket CLOB outcome-token universe.
    tests:
      - no_duplicate_grain:
          arguments:
            grain_columns: [clob_token_id]
    columns:
      - name: clob_token_id
        description: CLOB outcome token identifier.
        tests: [not_null, unique]
      - name: market_id
        description: Polymarket market identifier.
        tests: [not_null]

  - name: wc2026_token_minutely_odds
    description: >
      Full WC2026 minutely odds time series. One row per
      (clob_token_id, odds_timestamp_epoch) with WC2026 market labels and volume.
    tests:
      - price_in_unit_interval:
          arguments:
            identifier_columns: [clob_token_id, odds_timestamp_epoch]
    columns:
      - name: clob_token_id
        description: CLOB outcome token identifier.
        tests: [not_null]
      - name: market_id
        description: Polymarket market identifier.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('wc2026_markets')
                field: market_id
      - name: odds_timestamp_epoch
        description: Unix epoch seconds for the minutely observation.
        tests: [not_null]
      - name: price
        description: Outcome price in [0, 1].
        tests: [not_null]

  - name: wc2026_token_hourly_odds
    description: >
      Full WC2026 hourly OHLC odds time series. One row per
      (clob_token_id, odds_hour_utc) with WC2026 market labels and volume.
    tests:
      - no_duplicate_grain:
          arguments:
            grain_columns: [clob_token_id, odds_hour_epoch]
      - price_columns_in_unit_interval:
          arguments:
            identifier_columns: [clob_token_id, odds_hour_epoch]
            price_columns:
              - open_price
              - high_price
              - low_price
              - close_price
              - avg_price
    columns:
      - name: clob_token_id
        description: CLOB outcome token identifier.
        tests: [not_null]
      - name: market_id
        description: Polymarket market identifier.
        tests: [not_null]
      - name: odds_hour_epoch
        description: Unix epoch seconds for the UTC hour bucket.
        tests: [not_null]

  - name: wc2026_token_daily_odds
    description: >
      Full WC2026 daily OHLC odds time series. One row per
      (clob_token_id, odds_date_utc) with WC2026 market labels and volume.
    tests:
      - no_duplicate_grain:
          arguments:
            grain_columns: [clob_token_id, odds_date_utc]
            where: clob_token_id is not null and odds_date_utc is not null
      - price_columns_in_unit_interval:
          arguments:
            identifier_columns: [clob_token_id, odds_date_utc]
            price_columns:
              - open_price
              - high_price
              - low_price
              - close_price
              - avg_price
    columns:
      - name: clob_token_id
        description: CLOB outcome token identifier.
        tests: [not_null]
      - name: market_id
        description: Polymarket market identifier.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('wc2026_markets')
                field: market_id
      - name: odds_date_utc
        description: UTC calendar date for the aggregated token odds row.
        tests: [not_null]

  - name: wc2026_whale_minutely_odds
    description: >
      WC2026 minutely odds for high-liquidity markets
      (market_volume_usd >= wc2026_polymarket_whale_min_volume_usd).
    tests:
      - price_in_unit_interval:
          arguments:
            identifier_columns: [clob_token_id, odds_timestamp_epoch]
    columns:
      - name: clob_token_id
        description: CLOB outcome token identifier.
        tests: [not_null]
      - name: market_id
        description: Polymarket market identifier.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('wc2026_markets')
                field: market_id
      - name: price
        description: Outcome price in [0, 1].
        tests: [not_null]

  - name: wc2026_market_coverage
    description: WC2026 market-level coverage rolled up from wc2026_token_coverage.
    columns:
      - name: market_id
        description: Polymarket market identifier.
        tests: [not_null, unique]
      - name: token_count
        description: Count of distinct CLOB outcome tokens for the market.
        tests: [not_null]

  - name: wc2026_token_coverage
    description: >
      WC2026 token-level health and coverage mart with daily coverage, sync ledger
      state, persisted skip reason, and gap diagnostics.
    columns:
      - name: clob_token_id
        description: CLOB outcome token identifier.
        tests: [not_null, unique]
      - name: market_id
        description: Polymarket market identifier.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_wc2026_polymarket_markets')
                field: market_id

  - name: wc2026_knockout_markets
    description: WC2026 knockout-stage market/token export surface.
    tests:
      - no_duplicate_grain:
          arguments:
            grain_columns: [clob_token_id]
    columns:
      - name: clob_token_id
        description: CLOB outcome token identifier.
        tests: [not_null, unique]
      - name: market_id
        description: Polymarket market identifier.
        tests: [not_null]
      - name: stage_key
        description: Normalized WC2026 knockout stage key.
        tests: [not_null]

  - name: wc2026_knockout_market_tokens
    description: WC2026 knockout market tokens with stage/team classification.
    tests:
      - no_duplicate_grain:
          arguments:
            grain_columns: [clob_token_id]
    columns:
      - name: clob_token_id
        description: CLOB outcome token identifier.
        tests: [not_null, unique]
      - name: stage_key
        description: Normalized WC2026 knockout stage key.
        tests: [not_null]

  - name: wc2026_knockout_token_hourly_odds
    description: >
      WC2026 knockout hourly export with stage/team classification, sports metadata,
      result metadata, and hourly OHLC odds.
    tests:
      - no_duplicate_grain:
          arguments:
            grain_columns: [clob_token_id, odds_hour_epoch]
      - price_columns_in_unit_interval:
          arguments:
            identifier_columns: [clob_token_id, odds_hour_epoch]
            price_columns:
              - open_price
              - high_price
              - low_price
              - close_price
              - avg_price
    columns:
      - name: clob_token_id
        description: CLOB outcome token identifier.
        tests: [not_null]
      - name: market_id
        description: Polymarket market identifier.
        tests: [not_null]
      - name: odds_hour_epoch
        description: Unix epoch seconds for the UTC hour bucket.
        tests: [not_null]
