version: 2

seeds:
  - name: polymarket_wc2026_contract
    description: Internal WC2026 contract constants shared by dbt models/tests and Python parity tests.
    columns:
      - name: scope_name
        description: Fixed scope name for the WC2026 Polymarket pipeline.
        tests: [not_null, unique]
      - name: knockout_min_volume_usd
        description: Minimum reported Polymarket market volume admitted into the knockout public scope.
        tests: [not_null]
      - name: hourly_window_days
        description: Trailing hourly odds window in days.
        tests: [not_null]
      - name: hourly_window_hours
        description: Trailing hourly odds window in hours.
        tests: [not_null]
      - name: live_freshness_hours
        description: Maximum age in hours for a live knockout current price to be fresh.
        tests: [not_null]
      - name: results_freshness_hours
        description: Maximum age in hours before the FIFA result source load is stale.
        tests: [not_null]
      - name: round_of_32_min_raw_markets_ge_floor
        description: Warning threshold for raw Round-of-32 market coverage above the knockout volume floor.
        tests: [not_null]

  - name: polymarket_wc2026_polygon_settlement_markets
    description: >
      Independently authored WC2026 proposition manifest for Polygon settlement
      analytics. Its semantic evidence and CC0 fixture provenance do not depend
      on Gamma, CLOB, or Polymarket UI metadata.
    config:
      tags: [polygon_settlement]
    tests:
      - no_duplicate_grain:
          arguments:
            grain_columns: [proposition_id]
    columns:
      - name: proposition_id
        tests: [not_null, unique]
      - name: fifa_match_id
        tests: [not_null]
      - name: stage
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [group_stage, round_of_32, round_of_16, quarterfinal, semifinal, third_place, final]
      - name: proposition_type
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [home_win, draw, away_win, home_advances, home_win_third_place, home_wins_final]
      - name: condition_id
        tests: [not_null, unique]
      - name: yes_token_id
        tests: [not_null, unique]
      - name: no_token_id
        tests: [not_null, unique]
      - name: market_structure
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [standard, neg_risk]
      - name: exchange_address
        tests: [not_null]
      - name: manifest_sha256
        description: Canonical logical-content hash repeated on every reviewed manifest row.
        tests: [not_null]
      - name: manifest_version
        tests: [not_null]
      - name: reviewed_at_utc
        tests: [not_null]

  - name: polymarket_us_midterms_2026_contract
    description: Internal US midterms 2026 contract constants shared by dbt models/tests.
    columns:
      - name: scope_name
        description: Fixed scope name for the US midterms 2026 Polymarket pipeline.
        tests: [not_null, unique]
      - name: knockout_min_volume_usd
        description: Minimum reported Polymarket market volume admitted into the scoped public mart.
        tests: [not_null]
      - name: hourly_window_days
        description: Trailing hourly odds window in days.
        tests: [not_null]
      - name: hourly_window_hours
        description: Trailing hourly odds window in hours.
        tests: [not_null]
      - name: live_freshness_hours
        description: Maximum age in hours for a live current price to be fresh.
        tests: [not_null]
      - name: results_freshness_hours
        description: Reserved freshness threshold for a future results source.
        tests: [not_null]
      - name: round_of_32_min_raw_markets_ge_floor
        description: Reserved coverage threshold for future observability checks.
        tests: [not_null]

  - name: kalshi_wc2026_contract
    description: Internal Kalshi WC2026 contract constants shared by dbt models/tests and Python parity tests.
    columns:
      - name: scope_name
        description: Fixed scope name for the Kalshi WC2026 pipeline.
        tests: [not_null, unique]
      - name: hourly_window_days
        description: Trailing hourly odds window in days (full tournament).
        tests: [not_null]
      - name: hourly_window_hours
        description: Trailing hourly odds window in hours (full tournament).
        tests: [not_null]
      - name: live_freshness_hours
        description: Maximum age in hours for a live current price to be fresh.
        tests: [not_null]
      - name: results_freshness_hours
        description: Maximum age in hours before the FIFA result source load is stale.
        tests: [not_null]

  - name: international_results_wc2026_team_aliases
    description: Small naming bridge for joining prediction-market team labels to FIFA World Cup team names.
    columns:
      - name: market_team_name
        description: Team label as seen in Polymarket or Kalshi market metadata.
        tests: [not_null, unique]
      - name: canonical_team_name
        description: Canonical team name in the international_results WC2026 marts.
        tests: [not_null]

  - name: wc2026_schedule_matches
    description: Audited, committed 104-match FIFA World Cup 2026 schedule.
    columns:
      - name: match_id
        description: Official FIFA match number.
        tests: [not_null, unique]
      - name: source
        description: Public source provenance.
        tests: [not_null]

  - name: wc2026_third_place_options
    description: Audited FIFA Annexe C third-place combinations.
    columns:
      - name: option_id
        description: Stable option number.
        tests: [not_null, unique]

  - name: wc2026_base_camps_teams
    description: Public team base-camp and training-site reference data.
    columns:
      - name: team_name_model
        description: Strategy-facing team label.
        tests: [not_null, unique]

  - name: wc2026_venues
    description: Public venue coordinates, timezones, and altitude.
    columns:
      - name: venue
        description: Official schedule venue label.
        tests: [not_null, unique]

  - name: wc2026_team_canonical_aliases
    description: Audited cross-source canonical team aliases.
    columns:
      - name: variant_match_key
        description: Normalized source variant.
        tests: [not_null, unique]
      - name: canonical_match_key
        description: Normalized canonical key.
        tests: [not_null]

  - name: wc2026_tournament_classification
    description: Public tournament taxonomy for historical international results.
    columns:
      - name: tournament
        description: Upstream tournament label.
        tests: [not_null, unique]
      - name: competition_family
        description: Stable model-facing tournament family.
        tests: [not_null]
