name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  POLYMARKET_WC2026_HOURLY_ODDS_SCHEDULE_ENABLED: "false"
  POLYMARKET_US_MIDTERMS_2026_HOURLY_ODDS_SCHEDULE_ENABLED: "false"
  KALSHI_WC2026_HOURLY_ODDS_SCHEDULE_ENABLED: "false"
  WC2026_KNOCKOUT_MATCH_ODDS_HOURLY_SCHEDULE_ENABLED: "false"
jobs:
  static-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v6
        with:
          python-version: "3.10"
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.3.2
        with:
          enable-cache: true
      - run: uv sync --frozen --extra dev
      - name: Python lint
        run: uv run make python-lint
      - name: Secret policy
        run: uv run make check-secrets
      - name: Distribution policy
        run: uv run make check-distribution
      - name: Strict documentation build
        run: uv run make docs-build

  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v6
        with:
          python-version: "3.10"
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.3.2
        with:
          enable-cache: true
      - run: uv sync --frozen --extra dev
      - name: Parallel fast tests
        run: uv run make test
      - name: Replay-only HTTP contracts
        run: uv run make contract-http

  dbt:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v6
        with:
          python-version: "3.10"
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.3.2
        with:
          enable-cache: true
      - run: uv sync --frozen --extra dev
      - name: Fail-closed dbt lint
        run: uv run make dbt-lint

  fast-gate:
    if: always()
    needs: [static-docs, tests, dbt]
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Require every fast worker
        run: |
          test "${{ needs.static-docs.result }}" = "success"
          test "${{ needs.tests.result }}" = "success"
          test "${{ needs.dbt.result }}" = "success"
