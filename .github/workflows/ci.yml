name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  attestations: read
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  POLYMARKET_WC2026_HOURLY_ODDS_SCHEDULE_ENABLED: "false"

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install package and dev tools
        run: uv sync --extra dev

      - name: Lint
        run: uv run make lint

      - name: Tests
        run: uv run make test

      - name: Dagster integration smoke
        run: uv run make integration-dagster

      - name: dbt integration smoke
        run: uv run make integration-dbt

      - name: Coverage
        run: uv run make coverage

      - name: Docs
        run: uv run make docs-check

      - name: dbt parse
        run: uv run make dbt-parse

      - name: dbt build
        run: uv run make dbt-build-ci

      - name: Set up Python for Costguard
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Costguard
        uses: hypertrial/costguard/.github/actions/costguard@v2.5.0
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          base: origin/main
          warehouse: duckdb
          working-directory: dbt
          manifest: target/manifest.json
          fail-on: high
          min-confidence: high
          version: v2.5.0
          format: github
          receipt-path: costguard-receipt.json

      - name: Upload Costguard receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: costguard-receipt
          path: dbt/costguard-receipt.json
          if-no-files-found: ignore
          retention-days: 14
