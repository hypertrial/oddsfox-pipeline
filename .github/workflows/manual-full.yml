name: Manual Full Validation

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the signed multi-arch image after validation
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: manual-full-${{ github.ref }}
  cancel-in-progress: false

env:
  POLYMARKET_WC2026_HOURLY_ODDS_SCHEDULE_ENABLED: "false"
  POLYMARKET_US_MIDTERMS_2026_HOURLY_ODDS_SCHEDULE_ENABLED: "false"
  KALSHI_WC2026_HOURLY_ODDS_SCHEDULE_ENABLED: "false"
  WC2026_KNOCKOUT_MATCH_ODDS_HOURLY_SCHEDULE_ENABLED: "false"
  PUBLISH_IMAGE: ghcr.io/hypertrial/oddsfox-pipeline

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v6
        with:
          python-version: "3.10"
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.3.2
        with:
          enable-cache: true
      - run: uv sync --frozen --extra dev
      - name: Parallel unit coverage
        run: uv run make test-cov
      - name: Registered Dagster job coverage
        run: uv run make dagster-jobs-smoke-cov
      - name: Dagster refresh coverage
        run: uv run make dagster-refresh-cov
      - name: dbt integration coverage
        run: uv run make integration-dbt-cov
      - name: Enforce complete coverage
        run: uv run make coverage-report

  dbt-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v6
        with:
          python-version: "3.10"
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.3.2
        with:
          enable-cache: true
      - run: uv sync --frozen --extra dev
      - name: Install pinned Costguard
        run: |
          curl -fsSL https://raw.githubusercontent.com/hypertrial/costguard/v2.5.0/scripts/install.sh -o /tmp/install-costguard.sh
          sh /tmp/install-costguard.sh v2.5.0
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: dbt unit tests
        run: uv run make dbt-unit
      - name: Golden dbt marts
        run: uv run make golden-dbt
      - name: dbt source freshness
        run: uv run make dbt-source-freshness-ci
      - name: Polygon settlement graph
        run: uv run make dbt-polygon-settlement-ci
      - name: Ordinary dbt graph
        run: uv run make dbt-build-ci
      - name: Great Expectations data quality
        run: uv run make gx-data-quality
      - name: Costguard scan
        run: uv run make costguard-scan

  static-docs-container:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Reject publication outside main
        if: inputs.publish && github.ref != 'refs/heads/main'
        run: |
          echo "::error::publication is allowed only from main"
          exit 1

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v6
        with:
          python-version: "3.10"
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.3.2
        with:
          enable-cache: true
      - run: uv sync --frozen --extra dev
      - name: Install Chromium for rendered documentation checks
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/runtime/ms-playwright
        run: uv run playwright install --with-deps chromium
      - name: Python lint
        run: uv run make python-lint
      - name: Fail-closed dbt lint
        run: uv run make dbt-lint
      - name: Secret policy
        run: uv run make check-secrets
      - name: Distribution policy
        run: uv run make check-distribution
      - name: Package distribution smoke
        run: uv run make package-smoke
      - name: Replay-only HTTP contracts
        run: uv run make contract-http
      - name: Strict documentation build
        run: uv run make docs-build
      - name: Rendered documentation checks
        run: uv run make docs-test
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Build smoke image with shared cache
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          load: true
          tags: oddsfox-pipeline:ci
          build-args: VCS_REF=${{ github.sha }}
          provenance: false
          sbom: false
          cache-from: type=gha,scope=pipeline-image
          cache-to: type=gha,mode=max,scope=pipeline-image
      - name: Non-root runtime smoke
        run: uv run make container-smoke-run

  full-gate:
    if: always()
    needs: [coverage, dbt-quality, static-docs-container]
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Require every full-validation worker
        run: |
          test "${{ needs.coverage.result }}" = "success"
          test "${{ needs.dbt-quality.result }}" = "success"
          test "${{ needs.static-docs-container.result }}" = "success"

  publish:
    if: inputs.publish && github.ref == 'refs/heads/main'
    needs: full-gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.PUBLISH_IMAGE }}:${{ github.sha }}
            ${{ env.PUBLISH_IMAGE }}:main
          build-args: VCS_REF=${{ github.sha }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=pipeline-image
          cache-to: type=gha,mode=max,scope=pipeline-image
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign image by digest
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
          IMAGE: ${{ env.PUBLISH_IMAGE }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-name: ${{ env.PUBLISH_IMAGE }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
          create-storage-record: false
