site_name: OddsFox Docs
site_description: Public docs for the OddsFox prediction-market data pipeline.
repo_name: hypertrial/oddsfox-pipeline
repo_url: https://github.com/hypertrial/oddsfox-pipeline
theme:
  name: material
  language: en
  font: false
  logo: assets/images/oddsfox-white.png
  favicon: assets/images/oddsfox-white.png
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    scheme: slate
    primary: custom
    accent: cyan
plugins:
  - search
extra_css:
  - assets/stylesheets/oddsfox-dark.css
nav:
  - OddsFox:
      - Overview: index.md
      - Getting Started: quickstart.md
      - Architecture: architecture.md
      - Operations: operations.md
      - Troubleshooting: troubleshooting.md
  - Reference:
      - Configuration: configuration.md
      - Naming: naming.md
      - Warehouse: warehouse.md
      - Data Contracts: data-contracts.md
      - Scripts: scripts.md
  - Development:
      - Development Guide: development.md
      - Community: community.md
      - Changelog: changelog.md
strict: true
