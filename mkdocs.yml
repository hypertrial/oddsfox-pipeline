site_name: OddsFox Pipeline
site_description: Public documentation for the OddsFox Pipeline prediction-market data pipeline.
site_url: https://data.oddsfox.io/
repo_url: https://github.com/hypertrial/oddsfox-pipeline
repo_name: hypertrial/oddsfox-pipeline
strict: true

theme:
  name: material
  language: en
  font: false
  logo: assets/images/oddsfox-favicon.png
  favicon: assets/images/oddsfox-favicon.png
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.path
    - navigation.tracking
    - navigation.footer
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    scheme: slate
    primary: custom
    accent: custom

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mermaid@11.15.0/dist/mermaid.min.js
  - assets/javascripts/mermaid.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/hypertrial/oddsfox-pipeline
      name: OddsFox Pipeline on GitHub

nav:
  - Home: index.md
  - Get started:
      - Quickstart: getting-started/index.md
      - Choose a scope: getting-started/choose-a-scope.md
  - Guides:
      - Run a scope: guides/run-a-scope.md
      - Query the warehouse: guides/query-the-warehouse.md
      - Query recipes: guides/query-recipes.md
      - Recreate local marts: guides/recreate-local-marts.md
      - Enable schedules: guides/enable-schedules.md
      - Validate and recover: guides/validate-and-recover.md
      - Troubleshooting: guides/troubleshooting.md
  - Reference:
      - Configuration: reference/configuration.md
      - Orchestration: reference/orchestration.md
      - Warehouse: reference/warehouse.md
      - Data contracts: reference/data-contracts.md
      - Data dictionary: reference/data-dictionary.md
      - Scripts: reference/scripts.md
      - Naming: reference/naming.md
  - Concepts:
      - System overview: concepts/system-overview.md
      - Architecture: concepts/architecture.md
  - Development:
      - Development guide: development/index.md
      - Community: development/community.md
      - Changelog: development/changelog.md
