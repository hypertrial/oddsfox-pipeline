# WC2026 Polymarket market-scope preset for filtered-first ingestion.

default_scope: wc2026

scopes:
  wc2026:
    event_tags:
      - 2026-fifa-world-cup
      - fifa-world-cup
      - world-cup

    event_slugs:
      - 2026-fifa-world-cup-winner

    event_slug_prefixes:
      - 2026-fifa-world-cup

    market_ids: []

    registry_max_event_pages:
    keyset_closed: false
    keyset_volume_min: 100000.0
    keyset_related_tags: true
    tag_discovery: true
    tag_discovery_keywords:
      - world cup
      - world-cup
      - fifa
      - world-cup-2026
      - fifa-world-cup
      - wc-2026
      - world-cup-qualifier
      - world-cup-qualifiers
    tag_closure_rounds: 2
    tag_crawl_max: 100
    tag_closure_keyword_gate: true
    tag_crawl_denylist:
      - sports
      - soccer
      - football
      - politics
      - pop-culture
      - crypto
      - business
      - economy
      - world
      - games
